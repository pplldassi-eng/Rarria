<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Papa Conteur — Studio TikTok Africain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#0D0A08;--bg2:#1A1008;--bg3:#231508;--primary:#E85D26;--primary2:#c44d1a;--gold:#C4923A;--gold2:#a87830;--brown:#3D2314;--brown2:#2a180e;--text:#FAF7F2;--text2:#C8A898;--text3:#886050;--radius:1.2rem;--radius2:2rem}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brown);border-radius:2px}
h1,h2,h3{font-family:'Playfair Display',serif}.brand{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 1.5rem;border:none;border-radius:var(--radius);font-family:'Barlow',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;outline:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2);transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#0D0A08}.btn-gold:hover{background:var(--gold2)}
.btn-brown{background:var(--brown);color:var(--text)}.btn-brown:hover{background:var(--brown2)}
.btn-ghost{background:transparent;border:2px solid var(--brown);color:var(--text2)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:#8B1A1A;color:#fff}.btn-danger:hover{background:#6d1414}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}.btn-full{width:100%}.btn-sm{padding:.5rem 1rem;font-size:.85rem}
.card{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--radius2);padding:1.5rem}
.input,.textarea,.select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(196,146,58,.2);border-radius:var(--radius);color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;padding:.85rem 1rem;outline:none;transition:border-color .2s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--gold)}.textarea{resize:vertical;min-height:140px;line-height:1.6}.select option{background:var(--bg2)}
.label{display:block;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.tag{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .75rem;border-radius:99px;font-size:.75rem;font-weight:700}
.tag-primary{background:rgba(232,93,38,.2);color:var(--primary)}.tag-gold{background:rgba(196,146,58,.2);color:var(--gold)}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .4s ease}
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}@keyframes spin{to{transform:rotate(360deg)}}
.steps{display:flex;align-items:center;gap:0;margin-bottom:2rem}.step-item{display:flex;align-items:center;flex:1}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:all .3s}
.step-circle.active{background:var(--primary);color:#fff}.step-circle.done{background:var(--gold);color:#0D0A08}.step-circle.pending{background:var(--brown);color:var(--text3)}
.step-line{flex:1;height:2px;background:var(--brown);transition:background .3s}.step-line.done{background:var(--gold)}
.step-label{font-size:.65rem;text-align:center;color:var(--text3);margin-top:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:var(--radius2) var(--radius2) 0 0;padding:2rem 1.5rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.modal-close{background:var(--brown);border:none;color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.header{background:var(--bg2);border-bottom:1px solid rgba(196,146,58,.15);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
.header-back{background:var(--brown);border:none;color:var(--text2);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-title{font-family:'Playfair Display',serif;font-size:1.1rem;flex:1}.header-sub{font-size:.75rem;color:var(--text3);font-weight:400}
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:radial-gradient(ellipse at 50% 0%, rgba(196,146,58,.15) 0%, transparent 70%)}
.hero-icon{font-size:3.5rem;margin-bottom:1rem;display:block}.hero h1{font-size:2.2rem;margin-bottom:.5rem}.hero p{color:var(--text2);font-size:1rem;max-width:320px;margin:0 auto}
.projects-grid{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.project-card{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--radius2);padding:1.5rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.project-card:hover{border-color:rgba(196,146,58,.4);transform:translateY(-2px)}.project-card-name{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:.5rem}
.project-card-meta{display:flex;gap:.75rem;flex-wrap:wrap}.project-card-actions{display:flex;gap:.5rem;margin-top:1rem}
.char-card{background:var(--bg3);border:1px solid rgba(61,35,20,.7);border-radius:var(--radius);padding:1rem;display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.char-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.char-info{flex:1;min-width:0}.char-name{font-weight:700;margin-bottom:.2rem}.char-desc{font-size:.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-actions{display:flex;gap:.4rem}.char-btn{background:var(--brown);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.char-btn:hover{background:var(--primary)}.char-btn.del:hover{background:#8B1A1A}
.ep-card{background:var(--bg3);border:1px solid rgba(61,35,20,.5);border-radius:var(--radius);padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .2s;margin-bottom:.5rem}
.ep-card:hover{border-color:rgba(196,146,58,.3);background:var(--bg2)}.ep-num{width:40px;height:40px;border-radius:50%;background:var(--brown);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.ep-info{flex:1}.ep-title{font-weight:700;margin-bottom:.2rem}.ep-status{font-size:.75rem;color:var(--text3)}.ep-arrow{color:var(--text3);font-size:1.1rem}
.studio-content{padding:1.5rem;flex:1}.field-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
.ton-selector{display:flex;gap:.75rem}.ton-btn{flex:1;padding:.75rem;background:var(--brown);border:2px solid transparent;border-radius:var(--radius);color:var(--text2);font-family:'Barlow',sans-serif;font-weight:700;cursor:pointer;transition:all .2s}
.ton-btn.active{background:rgba(232,93,38,.2);border-color:var(--primary);color:var(--primary)}
.images-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.img-slot{aspect-ratio:9/16;background:var(--bg3);border:2px solid var(--brown);border-radius:var(--radius);overflow:hidden;position:relative}
.img-slot.done{border-color:rgba(196,146,58,.5)}.img-slot img{width:100%;height:100%;object-fit:cover}
.img-slot-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;opacity:0;transition:opacity .2s}
.img-slot:hover .img-slot-overlay{opacity:1}.img-slot-body{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
.img-counter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.audio-player{background:var(--bg3);border:1px solid var(--brown);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem}
audio{width:100%;height:36px;outline:none}.alert{padding:1rem;border-radius:var(--radius);font-size:.9rem;display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1rem}
.alert-error{background:rgba(139,26,26,.2);border:1px solid rgba(139,26,26,.5);color:#ff8080}
.alert-success{background:rgba(34,85,34,.2);border:1px solid rgba(34,85,34,.5);color:#80cc80}
.alert-info{background:rgba(196,146,58,.1);border:1px solid rgba(196,146,58,.3);color:var(--gold)}
.sep{height:1px;background:rgba(196,146,58,.1);margin:1.5rem 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-1{gap:.5rem}.gap-2{gap:1rem}.flex-1{flex:1}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}.mt-4{margin-top:2rem}.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}.mb-3{margin-bottom:1.5rem}
.text-center{text-align:center}.text-sm{font-size:.85rem}.text-xs{font-size:.75rem}.text-gold{color:var(--gold)}.text-primary{color:var(--primary)}.text-muted{color:var(--text3)}
.font-bold{font-weight:700}.italic{font-style:italic}.hidden{display:none}.w-full{width:100%}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const getGeminiKey=()=>localStorage.getItem('pc_gkey')||'';

let S={view:'home',projects:[],projId:null,epId:null,studio:null};
function freshStudio(){return{step:1,title:'',script:'',ton:'Mystérieux',audioBlob:null,audioUrl:null,audioDuration:0,segments:[],videoUrl:null,videoBlob:null,busy:false,error:null,imgCounter:0,imgTotal:0};}

function loadState(){try{const d=JSON.parse(localStorage.getItem('pc_state')||'{}');S.projects=d.projects||[];}catch(e){S.projects=[];}S.studio=freshStudio();}
function saveState(){try{localStorage.setItem('pc_state',JSON.stringify({projects:S.projects}));}catch(e){}}

const getProj=()=>S.projects.find(p=>p.id===S.projId);
const getEp=()=>{const p=getProj();return p?p.episodes.find(e=>e.id===S.epId):null;};
function patchEp(data){const p=getProj();if(!p)return;const i=p.episodes.findIndex(e=>e.id===S.epId);if(i>=0){p.episodes[i]={...p.episodes[i],...data};saveState();}}

function toSegments(script){let segs=script.split(/\n\n+/).map(p=>p.trim()).filter(p=>p.length>10);if(segs.length<4){segs=[];const sentences=script.split(/(?<=[.!?])\s+/).filter(s=>s.trim().length>10);const perSeg=Math.max(2,Math.ceil(sentences.length/4));for(let i=0;i<sentences.length;i+=perSeg){segs.push(sentences.slice(i,i+perSeg).join(' '));}}return segs.slice(0,6);}
function cleanForTTS(text){return text.replace(/\[.*?\]/g,' ').replace(/\*+/g,'').replace(/#/g,'').replace(/\s{2,}/g,' ').trim();}
function chunkText(text,max){const out=[];let cur=text.trim();while(cur.length>0){if(cur.length<=max){out.push(cur);break;}let i=cur.lastIndexOf(' ',max);if(i<0)i=max;out.push(cur.slice(0,i).trim());cur=cur.slice(i).trim();}return out.filter(c=>c.length>0);}

const GEMINI_MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-1.5-flash-8b'];
async function geminiCall(model,prompt,key){const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),25000);try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.75,maxOutputTokens:2048}})});clearTimeout(timer);const data=await r.json();if(!r.ok){if([503,429,500].includes(r.status))throw new Error('RETRY');throw new Error(data.error?.message||'Erreur');}return data.candidates?.[0]?.content?.parts?.[0]?.text||'';}catch(e){clearTimeout(timer);if(e.name==='AbortError')throw new Error('RETRY');throw e;}}
async function gemini(prompt){const key=getGeminiKey();if(!key)throw new Error('Clé Gemini manquante');for(const model of GEMINI_MODELS){try{return await geminiCall(model,prompt,key);}catch(e){if(e.message==='RETRY'){await sleep(1000);continue;}throw e;}}throw new Error('Gemini surchargé');}
async function enrichScript(script,ton,chars){const cl=chars.map(c=>`- ${c.name} (${c.role}): ${c.description}`).join('\n');return await gemini(`Tu es un vieux conteur africain. Enrichis ce script TikTok (zéro markdown, zéro astérisque, texte pur):\n1. Première phrase = choc <10 mots\n2. Ajoute [SILENCE] [SUSPENSE] [TAMBOUR] [FORET] [CHUCHOTE]\n3. Lignes vides entre paragraphes, chaque paragraphe finit en suspense\n4. Ton: ${ton==='Mystérieux'?'sombre terreur':'chaleureux mystère'}\n${cl?'Personnages:\n'+cl:''}\nSCRIPT: ${script}\nRéponds UNIQUEMENT le script enrichi.`);}

// ✅ POLLINATIONS AVEC MODÈLE BANANA
function buildBananaUrl(prompt, seed) {
  const maxLen = 180;
  const shortPrompt = prompt.length > maxLen ? prompt.slice(0, maxLen) : prompt;
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(shortPrompt)}?width=576&height=1024&seed=${seed}&nologo=true&model=banana`;
}

// Fallback Picsum
function getPicsumUrl(seed) {
  return `https://picsum.photos/seed/${seed}/576/1024`;
}

// Vérifie si l'image est vraiment chargée (pas noire)
async function checkImage(blobUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 10; canvas.height = 10;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 10, 10);
        const data = ctx.getImageData(0, 0, 10, 10).data;
        let sum = 0;
        for (let i = 0; i < data.length; i += 4) sum += data[i] + data[i+1] + data[i+2];
        resolve(sum > 300);
      } catch(e) { resolve(true); }
    };
    img.onerror = () => resolve(false);
    img.src = blobUrl;
  });
}

// Télécharge avec Banana + fallback Picsum
async function downloadImage(prompt, seed) {
  // Essayer Banana d'abord
  const bananaUrl = buildBananaUrl(prompt, seed);
  console.log(`[Banana] Tentative seed=${seed}...`);
  
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 25000);
    const resp = await fetch(bananaUrl, { signal: controller.signal });
    clearTimeout(timer);
    
    if (resp.ok) {
      const blob = await resp.blob();
      if (blob.size > 2048) {
        const blobUrl = URL.createObjectURL(blob);
        const valid = await checkImage(blobUrl);
        if (valid) {
          console.log(`[Banana] ✅ Succès (${(blob.size/1024).toFixed(1)}ko)`);
          return { url: blobUrl, source: 'banana' };
        }
        URL.revokeObjectURL(blobUrl);
        console.warn('[Banana] Image noire');
      } else {
        console.warn(`[Banana] Image trop petite (${blob.size} octets)`);
      }
    } else {
      console.warn(`[Banana] HTTP ${resp.status}`);
    }
  } catch(e) {
    console.warn(`[Banana] Erreur: ${e.message}`);
  }
  
  // Essayer avec un seed différent
  const altSeed = seed + 10000;
  const altUrl = buildBananaUrl(prompt, altSeed);
  console.log(`[Banana] 2e tentative seed=${altSeed}...`);
  
  try {
    await sleep(5000);
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 25000);
    const resp = await fetch(altUrl, { signal: controller.signal });
    clearTimeout(timer);
    
    if (resp.ok) {
      const blob = await resp.blob();
      if (blob.size > 2048) {
        const blobUrl = URL.createObjectURL(blob);
        const valid = await checkImage(blobUrl);
        if (valid) {
          console.log(`[Banana] ✅ Succès 2e tentative`);
          return { url: blobUrl, source: 'banana' };
        }
        URL.revokeObjectURL(blobUrl);
      }
    }
  } catch(e) {
    console.warn(`[Banana] 2e tentative échouée`);
  }
  
  // Fallback Picsum
  console.log(`[Image] 🔄 Fallback Picsum`);
  const picsumUrl = getPicsumUrl(seed);
  return { url: picsumUrl, source: 'picsum' };
}

async function doGenerateImages(){
  if(S.studio.busy)return;
  S.studio.busy=true;S.studio.error=null;
  if(S.studio.segments.length===0){
    const segs=toSegments(S.studio.script);
    S.studio.segments=segs.map(text=>({text,prompt:'',imgUrl:'',status:'idle',source:''}));
  }
  S.studio.segments=S.studio.segments.map(s=>({...s,imgUrl:'',status:'idle',source:''}));
  S.studio.imgCounter=0;S.studio.imgTotal=S.studio.segments.length;
  render();
  
  const proj=getProj();
  const chars=proj?.characters||[];
  const projSeed=proj?.seed||42000;
  
  // Obtenir les keywords via Gemini
  let keywords;
  try{
    const mc=chars.find(c=>c.role==='Principal')||chars[0];
    const cd=mc?mc.description.slice(0,80):'african person';
    const raw=await gemini(`Give 5 English keywords per scene. Return ONLY JSON array.\nStyle: ${S.studio.ton==='Mystérieux'?'dark african horror':'warm african folk tale'}\nCharacter: ${cd}\nScenes: ${S.studio.segments.map((s,i)=>`${i+1}. ${s.slice(0,120)}`).join('\n')}\nReturn ONLY: ["kw1, kw2...", "kw1, kw2..."]`);
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    keywords=Array.isArray(parsed)?parsed:S.studio.segments.map(()=>'mysterious african night');
  }catch(e){
    keywords=S.studio.segments.map(()=>'mysterious african night');
  }
  
  const mc=chars.find(c=>c.role==='Principal')||chars[0];
  const charDesc=mc?mc.description.slice(0,80):'african person';
  
  for(let i=0;i<S.studio.segments.length;i++){
    S.studio.segments[i].status='loading';
    updateSlot(i);updateCounter();
    
    const kw=keywords[i]||'mysterious african night';
    const prompt=`${charDesc}, ${kw}, cinematic lighting, dramatic atmosphere, african storytelling, realistic photo, vertical portrait, 8k quality`;
    S.studio.segments[i].prompt=prompt;
    
    const result=await downloadImage(prompt, projSeed+i*137);
    
    S.studio.segments[i].imgUrl=result.url;
    S.studio.segments[i].status='done';
    S.studio.segments[i].source=result.source;
    
    S.studio.imgCounter=i+1;
    updateSlot(i);updateCounter();
    
    if(i<S.studio.segments.length-1)await sleep(6000);
  }
  
  S.studio.busy=false;
  patchEp({images:S.studio.segments.map(s=>({text:s.text,url:s.imgUrl,source:s.source}))});
  render();
}

function updateSlot(i){
  const slot=$(`slot-${i}`);
  if(!slot)return;
  const seg=S.studio.segments[i];
  slot.className=`img-slot ${seg.status}`;
  if(seg.status==='done'){
    slot.innerHTML=`<img src="${seg.imgUrl}" alt=""><div class="img-slot-overlay"><span class="text-xs" style="color:rgba(255,255,255,.5)">${seg.source==='banana'?'🍌 Banana':'📸 Picsum'}</span><button class="btn btn-primary btn-sm" onclick="regenOne(${i})">↺</button><label class="btn btn-brown btn-sm" style="cursor:pointer">📁<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`;
  }else if(seg.status==='loading'){
    slot.innerHTML=`<div class="img-slot-body"><div class="spinner"></div><span class="text-sm text-muted">Banana...</span></div>`;
  }else if(seg.status==='error'){
    slot.innerHTML=`<div class="img-slot-body"><span style="font-size:1.5rem">❌</span><button class="btn btn-primary btn-sm" onclick="regenOne(${i})">↺ Retry</button><label class="btn btn-brown btn-sm" style="cursor:pointer;font-size:.75rem">📁 Importer<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`;
  }else{
    slot.innerHTML=`<div class="img-slot-body" style="opacity:.3"><span style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--brown)">${i+1}</span></div>`;
  }
}

function updateCounter(){const done=S.studio.segments.filter(s=>s.status==='done').length;const total=S.studio.segments.length;const el=$('img-counter');const bar=$('img-pbar');if(el)el.textContent=`${done}/${total} prêtes`;if(bar)bar.style.width=(done/Math.max(total,1)*100)+'%';}
window.regenOne=async function(i){if(S.studio.busy)return;S.studio.busy=true;S.studio.segments[i].status='loading';S.studio.segments[i].imgUrl='';updateSlot(i);const proj=getProj();const projSeed=(proj?.seed||42000)+Math.floor(Math.random()*10000);const result=await downloadImage(S.studio.segments[i].prompt||'african night',projSeed);S.studio.segments[i].imgUrl=result.url;S.studio.segments[i].status='done';S.studio.segments[i].source=result.source;S.studio.busy=false;updateSlot(i);updateCounter();};
window.importImg=function(i,input){const file=input.files?.[0];if(!file)return;S.studio.segments[i].imgUrl=URL.createObjectURL(file);S.studio.segments[i].status='done';S.studio.segments[i].source='import';updateSlot(i);updateCounter();};

// ═══════════ AUDIO TTS ═══════════
async function generateAudio(){const clean=cleanForTTS(S.studio.script);if(!clean)throw new Error('Script vide');try{return await ttsProxy(clean);}catch(e){return await ttsWebSpeech(clean);}}
async function ttsProxy(text){const chunks=chunkText(text,180);const ctx=new(window.AudioContext||window.webkitAudioContext)();const bufs=[];for(const chunk of chunks){const ttsUrl=`https://translate.google.com/translate_tts?ie=UTF-8&tl=fr&client=tw-ob&slow=true&q=${encodeURIComponent(chunk)}`;let ok=false;for(const px of['https://api.allorigins.win/raw?url=','https://corsproxy.io/?']){try{const r=await fetch(px+encodeURIComponent(ttsUrl));if(!r.ok)continue;const ab=await r.arrayBuffer();if(ab.byteLength<100)continue;bufs.push(await ctx.decodeAudioData(ab.slice(0)));ok=true;break;}catch(e){}}if(!ok)throw new Error('TTS failed');}const sr=bufs[0].sampleRate,len=bufs.reduce((s,b)=>s+b.length,0);const combined=ctx.createBuffer(1,len,sr);const ch=combined.getChannelData(0);let off=0;for(const b of bufs){ch.set(b.getChannelData(0),off);off+=b.length;}ctx.close();return wavBlob(combined);}
async function ttsWebSpeech(text){return new Promise((res,rej)=>{if(!window.speechSynthesis){rej(new Error('no speech'));return;}const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.82;u.pitch=0.8;const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('fr'));if(v)u.voice=v;const dur=Math.max(10,(text.split(/\s+/).length/150)*60/0.82);u.onstart=()=>res(silentWav(22050,Math.ceil(dur*22050)));u.onerror=e=>rej(new Error(e.error));speechSynthesis.cancel();setTimeout(()=>speechSynthesis.speak(u),100);});}
function wavBlob(buffer){const sr=buffer.sampleRate,s=buffer.getChannelData(0),ds=s.length*2;const ab=new ArrayBuffer(44+ds),v=new DataView(ab);const ws=(o,str)=>{for(let i=0;i<str.length;i++)v.setUint8(o+i,str.charCodeAt(i));};ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);let o=44;for(let i=0;i<s.length;i++){const x=Math.max(-1,Math.min(1,s[i]));v.setInt16(o,x<0?x*0x8000:x*0x7FFF,true);o+=2;}return new Blob([ab],{type:'audio/wav'});}
function silentWav(sr,n){const ds=n*2,ab=new ArrayBuffer(44+ds),v=new DataView(ab);const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);return new Blob([ab],{type:'audio/wav'});}

// ═══════════ VIDEO ═══════════
async function generateVideo(imgUrls,audioBlob,onProg){return new Promise(async(resolve,reject)=>{const W=576,H=1024;const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');onProg(5,'Chargement images...');const imgs=await Promise.all(imgUrls.map(url=>new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.crossOrigin='anonymous';const t=setTimeout(()=>res(null),20000);img.onload=()=>{clearTimeout(t);res(img);};img.onerror=()=>{clearTimeout(t);res(null);};img.src=url;})));const valid=imgs.filter(Boolean);if(!valid.length){reject(new Error('Aucune image'));return;}onProg(10,`${valid.length} images`);let audioCtx=null,audioBuffer=null,audioDuration=imgs.length*8;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();const ab=await audioBlob.arrayBuffer();audioBuffer=await audioCtx.decodeAudioData(ab);audioDuration=audioBuffer.duration;}catch(e){console.warn('Audio decode:',e.message);}const durationPerImage=(audioDuration*1000)/Math.max(imgs.length,1);onProg(20,`Montage ${audioDuration.toFixed(0)}s...`);const videoStream=cv.captureStream(30);if(audioCtx&&audioBuffer){try{const source=audioCtx.createBufferSource();source.buffer=audioBuffer;const dest=audioCtx.createMediaStreamDestination();source.connect(dest);const audioTrack=dest.stream.getAudioTracks()[0];if(audioTrack)videoStream.addTrack(audioTrack);source.start(0);}catch(e){console.warn('Audio track:',e.message);}}const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')?'video/webm;codecs=vp8,opus':'video/webm';const recorder=new MediaRecorder(videoStream,{mimeType:mime,videoBitsPerSecond:2500000});const chunks=[];recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};recorder.onstop=()=>resolve(new Blob(chunks,{type:mime}));recorder.onerror=reject;recorder.start(100);const startTime=performance.now();const kenBurns=[p=>({sx:1+p*.15,tx:-p*8,ty:-p*10}),p=>({sx:1+p*.15,tx:p*8,ty:-p*5}),p=>({sx:1+p*.12,tx:-p*4,ty:p*8})];function draw(){const elapsed=performance.now()-startTime;const imgIdx=Math.min(Math.floor(elapsed/durationPerImage),imgs.length-1);const progress=Math.min((elapsed%durationPerImage)/durationPerImage,1);const img=imgs[imgIdx];const kb=kenBurns[imgIdx%kenBurns.length](progress);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);if(img){ctx.save();ctx.translate(W/2+kb.tx,H/2+kb.ty);ctx.scale(kb.sx,kb.sx);ctx.drawImage(img,-W/2,-H/2,W,H);ctx.restore();}const gradient=ctx.createLinearGradient(0,H*.65,0,H);gradient.addColorStop(0,'rgba(0,0,0,0)');gradient.addColorStop(1,'rgba(0,0,0,.7)');ctx.fillStyle=gradient;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='600 14px Barlow,sans-serif';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('Papa Conteur',W-12,12);const tp=Math.min(elapsed/(audioDuration*1000),1);onProg(20+Math.floor(tp*78),`Montage: ${Math.floor(tp*100)}%`);if(elapsed<audioDuration*1000+500)requestAnimationFrame(draw);else{recorder.stop();onProg(100,'✅ Vidéo prête!');}}requestAnimationFrame(draw);});}

rk skin..." style="min-height:80px"></textarea></div><button class="btn btn-primary btn-full mt-2" id="confirm-char">Ajouter</button></div></div>`;}

function vStudio(){const st=S.studio,ep=getEp(),proj=getProj();const steps=[{n:1,l:'Script'},{n:2,l:'Voix'},{n:3,l:'Images'},{n:4,l:'Vidéo'}];let content='';if(st.step===1)content=`<div class="field-group"><label class="label">Titre</label><input class="input" id="ep-title" value="${st.title}" placeholder="Titre"></div><div class="field-group"><label class="label">Ton</label><div class="ton-selector"><button class="ton-btn ${st.ton==='Mystérieux'?'active':''}" data-ton="Mystérieux">🌑</button><button class="ton-btn ${st.ton==='Papa Conteur'?'active':''}" data-ton="Papa Conteur">🔥</button></div></div><div class="field-group"><label class="label">Script</label><textarea class="textarea" id="ep-script" style="min-height:180px" placeholder="Écris ton histoire...">${st.script}</textarea></div>${st.error?`<div class="alert alert-error">${st.error}</div>`:''}<button class="btn btn-gold btn-full mb-2" id="btn-enrich" ${st.busy?'disabled':''}>${st.busy?'<div class="spinner"></div>':'✨ Enrichir'}</button><button class="btn btn-primary btn-full" id="btn-s1-next" ${st.script.trim()?'':'disabled'}>✅ Suite →</button>`;else if(st.step===2)content=`<div class="card text-center mb-3"><div style="font-size:2rem">🎙</div><h3>Voix Off</h3></div>${st.error?`<div class="alert alert-error">${st.error}</div>`:''}${st.audioUrl?`<div class="audio-player"><div class="flex items-center gap-1 mb-1"><span style="color:var(--gold)">✅</span><span class="font-bold">Prêt</span></div><audio controls src="${st.audioUrl}" id="audio-el"></audio><button class="btn btn-ghost btn-sm" id="btn-regen-audio">↺</button></div>`:`<button class="btn btn-primary btn-full mb-3" id="btn-gen-audio" ${st.busy?'disabled':''}>${st.busy?'<div class="spinner"></div>':'🎙 Générer'}</button>`}<div class="flex gap-2"><button class="btn btn-ghost flex-1" id="btn-s2-back">←</button><button class="btn btn-primary flex-1" id="btn-s2-next" ${st.audioUrl?'':'disabled'}>✅ Suite →</button></div>`;else if(st.step===3){const segs=S.studio.segments;const total=segs.length||toSegments(S.studio.script).length;const done=segs.filter(s=>s.status==='done').length;if(segs.length===0){const rawSegs=toSegments(S.studio.script);S.studio.segments=rawSegs.map((text,i)=>({text,prompt:'',imgUrl:'',status:'idle',source:'',index:i}));}content=`<div class="alert alert-info"><span>ℹ️</span><span style="font-size:.82rem">Images générées avec Banana Nano Pro (qualité supérieure). 6s entre chaque image.</span></div><div class="flex items-center justify-between mb-2"><span id="img-counter" style="color:var(--text2)">${done}/${total} prêtes</span><button class="btn btn-primary btn-sm" id="btn-gen-imgs" ${st.busy?'disabled':''}>${st.busy?'<div class="spinner"></div>':'🍌 Générer'}</button></div>${st.busy?`<div class="progress-bar mb-2"><div class="progress-fill" id="img-pbar" style="width:${done/Math.max(total,1)*100}%"></div></div>`:''}<div class="images-grid">${S.studio.segments.map((seg,i)=>`<div class="img-slot ${seg.status}" id="slot-${i}">${seg.status==='done'&&seg.imgUrl?`<img src="${seg.imgUrl}" alt=""><div class="img-slot-overlay"><span class="text-xs" style="color:rgba(255,255,255,.5)">${seg.source==='banana'?'🍌':'📸'}</span><button class="btn btn-primary btn-sm" onclick="regenOne(${i})">↺</button><label class="btn btn-brown btn-sm" style="cursor:pointer">📁<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`:seg.status==='loading'?`<div class="img-slot-body"><div class="spinner"></div><span class="text-sm text-muted">Banana...</span></div>`:seg.status==='error'?`<div class="img-slot-body"><span style="font-size:1.5rem">❌</span><button class="btn btn-primary btn-sm" onclick="regenOne(${i})">↺ Retry</button><label class="btn btn-brown btn-sm" style="cursor:pointer;font-size:.75rem">📁 Importer<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`:`<div class="img-slot-body" style="opacity:.3"><span style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--brown)">${i+1}</span></div>`}</div>`).join('')}</div><div class="flex gap-2"><button class="btn btn-ghost flex-1" id="btn-s3-back">←</button><button class="btn btn-primary flex-1" id="btn-s3-next" ${done>0?'':'disabled'}>✅ Suite →</button></div>`;}else if(st.step===4){const readyUrls=S.studio.segments.filter(s=>s.status==='done'&&s.imgUrl).map(s=>s.imgUrl);content=`${st.error?`<div class="alert alert-error">${st.error}</div>`:''}<div class="card mb-3"><h3 style="color:var(--gold);margin-bottom:1rem">🎬 Montage</h3><div class="flex gap-1 mb-2 text-sm text-muted"><span>📸 ${readyUrls.length} img</span><span>•</span><span>🎙 ${st.audioDuration?Math.round(st.audioDuration)+'s':'OK'}</span></div>${st.videoUrl?`<div class="alert alert-success mb-2">✅ Prêt !</div><video src="${st.videoUrl}" controls style="width:100%;border-radius:var(--radius);margin-bottom:1rem;max-height:50vh"></video><a href="${st.videoUrl}" download="papa_conteur.webm" class="btn btn-primary btn-full mb-2">⬇️ Télécharger</a><button class="btn btn-ghost btn-full" id="btn-regen-vid">↺</button>`:`${st.busy?`<div class="progress-bar mb-2"><div class="progress-fill" id="vid-bar" style="width:0%"></div></div><p class="text-sm text-muted mb-2" id="vid-txt">...</p>`:''}<button class="btn btn-primary btn-full mb-2" id="btn-gen-vid" ${st.busy?'disabled':''}>${st.busy?'<div class="spinner"></div>':'🎬 Créer'}</button>`}</div><div class="flex gap-2"><button class="btn btn-ghost flex-1" id="btn-s4-back">←</button><button class="btn btn-gold flex-1" id="btn-new-ep-2">🔄 Nouveau</button></div>`;}return`<div class="header"><button class="header-back" id="btn-back-proj">←</button><div class="header-title">${ep?.title||'Nouvel épisode'}<div class="header-sub">${proj?.name||''}</div></div></div><div class="studio-content"><div class="steps">${steps.map((s,i)=>`<div class="step-item"><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="step-circle ${st.step>s.n?'done':st.step===s.n?'active':'pending'}">${st.step>s.n?'✓':s.n}</div><span class="step-label">${s.l}</span></div>${i<3?`<div class="step-line ${st.step>s.n?'done':''}"></div>`:''}</div>`).join('')}</div>${content}</div>`;}

function on(id,ev,fn){const el=$(id);if(el)el.addEventListener(ev,fn);}
const show=id=>{const e=$(id);if(e)e.classList.remove('hidden');};
const hide=id=>{const e=$(id);if(e)e.classList.add('hidden');};

function attachEvents(){
  on('btn-save-key','click',()=>{const k=$('gkey')?.value?.trim();if(!k?.startsWith('AIza')){alert('Clé invalide');return;}localStorage.setItem('pc_gkey',k);alert('✅ Sauvegardé!');render();});
  on('btn-new-proj','click',()=>show('modal-proj'));
  on('close-proj','click',()=>hide('modal-proj'));
  on('confirm-proj','click',()=>{const n=$('proj-name')?.value?.trim();if(!n){alert('Nom requis');return;}S.projects.unshift({id:uid(),name:n,characters:[],episodes:[],seed:Math.floor(10000+Math.random()*90000)});saveState();hide('modal-proj');render();});
  document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{S.projId=el.dataset.open;S.view='project';render();}));
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Supprimer?')){S.projects=S.projects.filter(p=>p.id!==el.dataset.del);saveState();render();}}));
  on('btn-home','click',()=>{S.view='home';render();});
  on('btn-add-char','click',()=>show('modal-char'));
  on('close-char','click',()=>hide('modal-char'));
  on('confirm-char','click',()=>{const n=$('char-name')?.value?.trim(),d=$('char-desc')?.value?.trim();if(!n||!d){alert('Remplis tout');return;}const p=getProj();if(!p)return;p.characters.push({id:uid(),name:n,role:$('char-role')?.value||'Principal',description:d});saveState();hide('modal-char');render();});
  document.querySelectorAll('[data-del-char]').forEach(el=>el.addEventListener('click',()=>{const p=getProj();if(!p)return;p.characters=p.characters.filter(c=>c.id!==el.dataset.delChar);saveState();render();}));
  on('btn-new-ep','click',()=>{const p=getProj();if(!p)return;const ep={id:uid(),title:`Épisode ${p.episodes.length+1}`,script:'',audioUrl:null,images:[],videoUrl:null};p.episodes.push(ep);saveState();S.epId=ep.id;S.studio=freshStudio();S.studio.segments=[];S.view='studio';render();});
  document.querySelectorAll('[data-open-ep]').forEach(el=>el.addEventListener('click',()=>{S.epId=el.dataset.openEp;const ep=getEp();if(!ep)return;S.studio=freshStudio();S.studio.title=ep.title||'';S.studio.script=ep.script||'';if(ep.audioUrl)S.studio.audioUrl=ep.audioUrl;if(ep.images?.length>0)S.studio.segments=ep.images.map((img,i)=>({text:img.text||'',prompt:'',imgUrl:img.url||'',status:img.url?'done':'idle',source:img.source||'',index:i}));if(ep.videoUrl)S.studio.videoUrl=ep.videoUrl;S.view='studio';render();}));
  document.querySelectorAll('.ton-btn').forEach(b=>b.addEventListener('click',()=>{S.studio.ton=b.dataset.ton;render();}));
  on('ep-title','input',e=>{S.studio.title=e.target.value;});
  on('ep-script','input',e=>{S.studio.script=e.target.value;const b=$('btn-s1-next');if(b)b.disabled=!e.target.value.trim();});
  on('btn-enrich','click',async()=>{const sc=$('ep-script')?.value?.trim()||S.studio.script;if(!sc)return;S.studio.script=sc;S.studio.busy=true;S.studio.error=null;render();try{S.studio.script=await enrichScript(sc,S.studio.ton,getProj()?.characters||[]);}catch(e){S.studio.error=e.message;}S.studio.busy=false;render();});
  on('btn-s1-next','click',()=>{S.studio.title=$('ep-title')?.value||S.studio.title;S.studio.script=$('ep-script')?.value||S.studio.script;patchEp({title:S.studio.title,script:S.studio.script});S.studio.step=2;S.studio.error=null;render();});
  on('btn-gen-audio','click',async()=>{S.studio.busy=true;S.studio.error=null;render();try{const b=await generateAudio();const u=URL.createObjectURL(b);S.studio.audioBlob=b;S.studio.audioUrl=u;patchEp({audioUrl:u});}catch(e){S.studio.error='Audio: '+e.message;}S.studio.busy=false;render();setTimeout(()=>{const a=$('audio-el');if(a)a.onloadedmetadata=()=>{S.studio.audioDuration=a.duration;};},200);});
  on('btn-regen-audio','click',()=>{S.studio.audioUrl=null;S.studio.audioBlob=null;S.studio.audioDuration=0;render();});
  on('btn-s2-back','click',()=>{S.studio.step=1;render();});
  on('btn-s2-next','click',()=>{const a=$('audio-el');if(a)S.studio.audioDuration=a.duration||0;if(S.studio.segments.length===0){const segs=toSegments(S.studio.script);S.studio.segments=segs.map((t,i)=>({text:t,prompt:'',imgUrl:'',status:'idle',source:'',index:i}));}S.studio.step=3;S.studio.error=null;render();});
  on('btn-gen-imgs','click',doGenerateImages);
  on('btn-s3-back','click',()=>{S.studio.step=2;render();});
  on('btn-s3-next','click',()=>{S.studio.step=4;S.studio.error=null;render();});
  on('btn-gen-vid','click',async()=>{const urls=S.studio.segments.filter(s=>s.status==='done'&&s.imgUrl).map(s=>s.imgUrl);if(!urls.length){alert('Aucune image');return;}if(!S.studio.audioBlob){alert('Aucun audio');return;}S.studio.busy=true;S.studio.error=null;render();try{const blob=await generateVideo(urls,S.studio.audioBlob,(pct,msg)=>{const b=$('vid-bar'),t=$('vid-txt');if(b)b.style.width=pct+'%';if(t)t.textContent=msg;});S.studio.videoBlob=blob;S.studio.videoUrl=URL.createObjectURL(blob);patchEp({videoUrl:S.studio.videoUrl});}catch(e){S.studio.error='Vidéo: '+e.message;}S.studio.busy=false;render();});
  on('btn-regen-vid','click',()=>{S.studio.videoUrl=null;S.studio.videoBlob=null;render();});
  on('btn-s4-back','click',()=>{S.studio.step=3;render();});
  on('btn-new-ep-2','click',()=>{S.view='project';S.epId=null;S.studio=freshStudio();render();});
  on('btn-back-proj','click',()=>{S.view='project';S.epId=null;render();});
}

loadState();render();
console.log('🪘 Papa Conteur v8 — Banana Nano Pro');
</script>
