<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Papa Conteur — Studio TikTok</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --ink:#08060A;
  --ink2:#110D16;
  --ink3:#1C1524;
  --ink4:#261C30;
  --ember:#E8612A;
  --ember2:#FF7A45;
  --gold:#C8941A;
  --gold2:#E8B840;
  --smoke:#A898B8;
  --smoke2:#7A6888;
  --smoke3:#4A3858;
  --parchment:#F5EDD8;
  --parchment2:#C8B898;
  --r:.9rem;
  --r2:1.4rem;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --glow:0 0 40px rgba(232,97,42,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.8rem 1.4rem;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;letter-spacing:.01em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--ember),var(--ember2));color:#fff;box-shadow:0 4px 16px rgba(232,97,42,.35);width:100%}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 24px rgba(232,97,42,.5);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);box-shadow:0 4px 16px rgba(200,148,26,.3);width:100%}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 24px rgba(200,148,26,.45);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1.5px solid var(--smoke3);color:var(--smoke)}
.btn-ghost:hover:not(:disabled){border-color:var(--smoke2);color:var(--parchment2)}
.btn-dark{background:var(--ink3);color:var(--parchment2);border:1px solid var(--smoke3)}
.btn-danger{background:rgba(180,30,30,.2);border:1.5px solid rgba(180,30,30,.4);color:#ff8888}

/* ── CARDS ── */
.card{background:var(--ink2);border:1px solid rgba(200,148,26,.12);border-radius:var(--r2);padding:1.4rem;margin-bottom:.85rem;box-shadow:var(--shadow)}
.card-glow{box-shadow:var(--shadow),var(--glow)}

/* ── INPUTS ── */
.input,.textarea{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(200,148,26,.15);border-radius:var(--r);color:var(--parchment);padding:.8rem 1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;margin-bottom:.75rem;transition:border-color .2s}
.input:focus,.textarea:focus{border-color:rgba(200,148,26,.5);background:rgba(255,255,255,.06)}
.textarea{resize:vertical;min-height:160px;line-height:1.65}
.label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--smoke2);margin-bottom:.4rem;display:block}

/* ── TAGS ── */
.tag{display:inline-block;padding:.2rem .7rem;border-radius:99px;font-size:.72rem;font-weight:600;margin:2px;letter-spacing:.02em}
.tag-g{background:rgba(200,148,26,.15);color:var(--gold2);border:1px solid rgba(200,148,26,.25)}
.tag-p{background:rgba(232,97,42,.15);color:var(--ember2);border:1px solid rgba(232,97,42,.25)}

/* ── SPINNER ── */
.spin{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.1);border-top-color:var(--ember);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto;flex-shrink:0}

/* ── PROGRESS BAR ── */
.pbar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:.75rem 0}
.pfill{height:100%;background:linear-gradient(90deg,var(--ember),var(--gold2));border-radius:2px;transition:width .35s ease}

/* ── ALERTS ── */
.alert{padding:.9rem 1rem;border-radius:var(--r);font-size:.88rem;margin-bottom:.85rem;line-height:1.5}
.ae{background:rgba(180,30,30,.12);border:1px solid rgba(180,30,30,.35);color:#ff9090}
.as{background:rgba(30,120,60,.12);border:1px solid rgba(30,120,60,.35);color:#80dd99}
.ai{background:rgba(200,148,26,.08);border:1px solid rgba(200,148,26,.25);color:var(--gold2)}

/* ── IMAGE GRID ── */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:1rem 0}
.islot{aspect-ratio:9/16;background:var(--ink3);border:1.5px solid var(--smoke3);border-radius:var(--r);overflow:hidden;position:relative}
.islot.done{border-color:rgba(200,148,26,.45)}
.islot.err{border-color:rgba(180,30,30,.4)}
.islot img{width:100%;height:100%;object-fit:cover}
.islot .iover{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;gap:.5rem;opacity:0;transition:opacity .2s}
.islot:hover .iover{opacity:1}
.islot .ibody{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}

/* ── AUDIO ── */
audio{width:100%;height:34px;margin:.4rem 0;border-radius:var(--r);opacity:.9}

/* ── UTILS ── */
.hidden{display:none}.tc{text-align:center}.ts{font-size:.85rem}.tm{color:var(--smoke2)}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}
.flex{display:flex}.g1{gap:.5rem}.g2{gap:1rem}.ic{align-items:center}.jb{justify-content:space-between}

/* ── HERO ── */
.hero{text-align:center;padding:3.5rem 1.5rem 2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,97,42,.12),transparent);pointer-events:none}
.hero-icon{font-size:3rem;display:block;margin-bottom:.75rem;filter:drop-shadow(0 0 20px rgba(232,97,42,.5))}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;background:linear-gradient(135deg,var(--gold2),var(--parchment),var(--ember2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:.4rem}
.hero-sub{font-size:.85rem;color:var(--smoke2);letter-spacing:.05em;text-transform:uppercase;font-weight:500}

/* ── NAV HEADER ── */
.nav{background:rgba(8,6,10,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:.85rem 1.2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(200,148,26,.1)}
.nav-back{background:var(--ink3);border:1px solid var(--smoke3);color:var(--smoke);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.nav-back:hover{border-color:var(--smoke2);color:var(--parchment)}
.nav-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--parchment)}
.nav-sub{font-size:.72rem;color:var(--smoke2);margin-top:1px}

/* ── STEPPER ── */
.stepper{display:flex;align-items:center;margin-bottom:1.5rem}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;transition:all .3s}
.step-circle.done{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink)}
.step-circle.active{background:linear-gradient(135deg,var(--ember),var(--ember2));color:#fff;box-shadow:0 0 16px rgba(232,97,42,.4)}
.step-circle.idle{background:var(--ink3);color:var(--smoke3);border:1.5px solid var(--smoke3)}
.step-label{font-size:.6rem;color:var(--smoke2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.step-line{flex:1;height:2px;margin-bottom:1.2rem;transition:background .3s}
.step-line.done{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.step-line.idle{background:var(--smoke3)}

/* ── PROJECT CARD ── */
.proj-card{background:var(--ink2);border:1px solid rgba(200,148,26,.1);border-radius:var(--r2);padding:1.1rem 1.2rem;display:flex;align-items:center;gap:1rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.proj-card:hover{border-color:rgba(200,148,26,.3);transform:translateX(3px)}
.proj-avatar{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--ember),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--ink);flex-shrink:0}
.proj-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;margin-bottom:3px}
.proj-meta{font-size:.75rem;color:var(--smoke2)}

/* ── CHAR CARD ── */
.char-card{background:var(--ink3);border:1px solid rgba(74,56,88,.6);border-radius:var(--r);padding:.9rem 1rem;display:flex;align-items:center;gap:.9rem;margin-bottom:.5rem}
.char-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--ink);flex-shrink:0;font-family:'Cormorant Garamond',serif}

/* ── EPISODE CARD ── */
.ep-card{background:var(--ink3);border:1px solid rgba(74,56,88,.5);border-radius:var(--r);padding:.9rem 1rem;display:flex;align-items:center;gap:.9rem;cursor:pointer;margin-bottom:.5rem;transition:all .2s}
.ep-card:hover{border-color:rgba(200,148,26,.3);background:var(--ink4)}
.ep-num{width:38px;height:38px;border-radius:50%;background:var(--ink4);border:1.5px solid var(--smoke3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}

/* ── TON / MODEL BUTTONS ── */
.choice-btn{flex:1;padding:.7rem .5rem;border-radius:var(--r);border:1.5px solid var(--smoke3);background:transparent;color:var(--smoke);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;text-align:center}
.choice-btn.active{background:rgba(232,97,42,.15);border-color:var(--ember);color:var(--ember2)}

/* ── DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(200,148,26,.15),transparent);margin:1.2rem 0}

/* ── VIDEO ── */
video{width:100%;border-radius:var(--r2);margin-bottom:1rem;max-height:55vh;background:#000}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
// ═══════════════════════════════════════
// PAPA CONTEUR v6 — PRODUCTION
// ═══════════════════════════════════════
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);

// ─── CLÉS API (intégrées) ───────────────
const GEMINI_KEY='AIzaSyBGGvKMks5e7hIJU1aYvzAotJBX-wAZlms';
const CF_ACCOUNT_ID='e01ca7d1c8d03c8f3738c0318a136772';
const CF_TOKEN='cfut_GVXdjTSTQMJsZRfVHkJXtxb7FmukekmimFmwiJTv4de68487';
// ────────────────────────────────────────

let S={view:'home',projects:[],projId:null,epId:null,studio:fresh()};

function fresh(){
  return{step:1,title:'',script:'',ton:'Mystérieux',imgModel:'schnell',audioBlob:null,audioUrl:null,audioDur:0,segs:[],vidUrl:null,vidBlob:null,busy:false,err:null,silenceSegments:[]};
}
function load(){try{const d=JSON.parse(localStorage.getItem('pc_v6')||'{}');S.projects=d.p||[];}catch(e){S.projects=[];}}
function save(){try{localStorage.setItem('pc_v6',JSON.stringify({p:S.projects}));}catch(e){}}
const proj=()=>S.projects.find(p=>p.id===S.projId);
const ep=()=>{const p=proj();return p?p.episodes.find(e=>e.id===S.epId):null;};
function patchEp(d){const p=proj();if(!p)return;const i=p.episodes.findIndex(e=>e.id===S.epId);if(i>=0){p.episodes[i]={...p.episodes[i],...d};save();}}

function mkSegs(script){
  const c=script.trim();if(!c)return[];
  let parts=c.split(/\n\n+/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<3)parts=c.split(/\n/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<3)parts=c.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<2)parts=[c,c,c,c];
  while(parts.length<4)parts=[...parts,...parts];
  return parts.slice(0,6);
}
function cleanTTS(t){return t.replace(/\[.*?\]/g,' ').replace(/\*+/g,'').replace(/\s{2,}/g,' ').trim();}
function chunk(t,max){const out=[];let cur=t.trim();while(cur.length>0){if(cur.length<=max){out.push(cur);break;}let i=cur.lastIndexOf(' ',max);if(i<0)i=max;out.push(cur.slice(0,i).trim());cur=cur.slice(i).trim();}return out.filter(c=>c.length>0);}

// ─── GEMINI ───────────────────────────
const MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-1.5-flash-8b'];
async function callModel(model,prompt){
  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),25000);
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.75,maxOutputTokens:2048}})});
    clearTimeout(t);
    const d=await r.json();
    if(!r.ok){const code=r.status;if(code===503||code===429||code===500)throw new Error('RETRY:'+code);throw new Error('Gemini '+code);}
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }catch(e){clearTimeout(t);if(e.name==='AbortError')throw new Error('RETRY:timeout');throw e;}
}
async function gemini(prompt){
  for(const m of MODELS){try{return await callModel(m,prompt);}catch(e){if(e.message.startsWith('RETRY:')){await sleep(1500);continue;}throw e;}}
  throw new Error('Gemini surchargé, réessaie dans quelques secondes');
}
async function enrichScript(script,ton,chars){
  const cl=chars.map(c=>`- ${c.name}(${c.role}): ${c.description}`).join('\n');
  return await gemini(`Tu es un conteur africain mystérieux.\nEnrichis ce script TikTok:\n1. Première phrase = choc en <10 mots\n2. Ajoute [SILENCE][SUSPENSE][TAMBOUR][FORET][CHUCHOTE] sur lignes séparées\n3. Zéro markdown, texte pur, lignes vides entre paragraphes\n4. Chaque para finit en suspense\n5. Ton: ${ton==='Mystérieux'?'sombre terreur':'chaleureux mystère doux'}\n${cl?'Personnages:\n'+cl:''}\nSCRIPT:\n${script}\nUNIQUEMENT le script enrichi.`);
}
async function getKeywords(segs,chars,ton){
  const mc=chars.find(c=>c.role==='Principal')||chars[0];
  const cd=mc?mc.description.slice(0,80):'african person';
  try{
    const raw=await gemini(`Give exactly 6 English keywords per scene.\nReturn ONLY a JSON array of strings (one per scene). No markdown.\nStyle: ${ton==='Mystérieux'?'dark horror african cinematic':'warm african folk tale cinematic'}\nCharacter: ${cd}\nScenes:\n${segs.map((s,i)=>`${i+1}. ${s.slice(0,120)}`).join('\n')}\nONLY the JSON array.`);
    const p=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(Array.isArray(p)){while(p.length<segs.length)p.push(p[0]||'mysterious african night');return p;}
  }catch(e){}
  return segs.map(()=>'mysterious african night, dramatic shadows, moonlight, cinematic');
}

// ─── IMAGES — CLOUDFLARE ──────────────
function getCFModel(imgModel){
  if(imgModel==='pro')return'@cf/stabilityai/stable-diffusion-xl-base-1.0';
  return'@cf/black-forest-labs/flux-1-schnell';
}
async function callCFImgAPI(prompt,imgModel){
  const model=getCFModel(imgModel);
  const url=`https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/ai/run/${model}`;
  const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),60000);
  try{
    const resp=await fetch(url,{method:'POST',headers:{'Authorization':`Bearer ${CF_TOKEN}`,'Content-Type':'application/json'},signal:ctrl.signal,body:JSON.stringify({prompt:prompt.slice(0,500),num_steps:imgModel==='pro'?30:8,width:576,height:1024})});
    clearTimeout(timer);
    if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error('CF '+resp.status+': '+(err.errors?.[0]?.message||'erreur'));}
    const blob=await resp.blob();
    if(blob.size<1000)throw new Error('Image trop petite');
    return URL.createObjectURL(blob);
  }catch(e){clearTimeout(timer);throw e;}
}
async function genImg(prompt,slotIdx,imgModel,maxTries=4){
  for(let a=0;a<maxTries;a++){
    setBadge(slotIdx,`${a+1}/${maxTries}…`);
    try{
      const url=await callCFImgAPI(prompt,imgModel||'schnell');
      if(url)return url;
    }catch(e){
      console.warn(`[img${slotIdx+1}] CF:`,e.message);
      if(e.message.includes('quota')||e.message.includes('limit'))break;
      await sleep(3000);
    }
  }
  return null;
}
function setBadge(i,txt){const s=$(`slot-${i}`);if(!s)return;const b=s.querySelector('.ibadge');if(b)b.textContent=txt;}
function drawSlot(i){
  const slot=$(`slot-${i}`);if(!slot)return;
  const seg=S.studio.segs[i];if(!seg)return;
  slot.className=`islot ${seg.status==='done'?'done':seg.status==='err'?'err':''}`;
  if(seg.status==='done'&&seg.url){
    slot.innerHTML=`<img src="${seg.url}" alt=""><div class="iover"><button class="btn btn-dark" style="width:auto;padding:.45rem .9rem;font-size:.78rem" onclick="regenImg(${i})">↺</button><label class="btn btn-dark" style="width:auto;padding:.45rem .9rem;font-size:.78rem;cursor:pointer">📁<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`;
  }else if(seg.status==='loading'){
    slot.innerHTML=`<div class="ibody"><div class="spin"></div><span class="ts tm ibadge" style="font-size:.7rem;margin-top:.3rem">Génération…</span></div>`;
  }else if(seg.status==='err'){
    slot.innerHTML=`<div class="ibody"><span style="font-size:1.4rem">❌</span><button class="btn btn-primary" style="width:auto;padding:.4rem .9rem;font-size:.78rem;margin-top:.3rem" onclick="regenImg(${i})">↺ Retry</button></div>`;
  }else{
    slot.innerHTML=`<div class="ibody" style="opacity:.2"><span style="font-size:2rem;font-family:'Cormorant Garamond',serif;color:var(--smoke3)">${i+1}</span></div>`;
  }
}
function updCtr(){
  const done=S.studio.segs.filter(s=>s.status==='done').length,tot=S.studio.segs.length;
  const c=$('img-ctr'),b=$('img-pb');
  if(c)c.textContent=`${done}/${tot} prêtes`;
  if(b)b.style.width=(done/Math.max(tot,1)*100)+'%';
}
async function doGenImgs(){
  if(S.studio.busy)return;S.studio.busy=true;S.studio.err=null;
  if(S.studio.segs.length===0)S.studio.segs=mkSegs(S.studio.script).map(text=>({text,prompt:'',url:'',status:'idle'}));
  S.studio.segs=S.studio.segs.map(s=>({...s,url:'',status:'idle'}));
  render();
  const p=proj(),chars=p?p.characters:[];
  let kws;
  try{kws=await getKeywords(S.studio.segs.map(s=>s.text),chars,S.studio.ton);}
  catch(e){kws=S.studio.segs.map(()=>'mysterious african night cinematic');}
  const mc=chars.find(c=>c.role==='Principal')||chars[0];
  const cd=mc?mc.description.slice(0,60):'african person';
  for(let i=0;i<S.studio.segs.length;i++){
    S.studio.segs[i].status='loading';drawSlot(i);updCtr();
    const kw=kws[i]||kws[0]||'mysterious african night';
    const prompt=`${kw}, ${cd}, dramatic cinematic lighting, photorealistic`;
    S.studio.segs[i].prompt=prompt;
    const url=await genImg(prompt,i,S.studio.imgModel,4);
    S.studio.segs[i].url=url||'';S.studio.segs[i].status=url?'done':'err';
    drawSlot(i);updCtr();
    if(i<S.studio.segs.length-1)await sleep(1500);
  }
  S.studio.busy=false;
  patchEp({images:S.studio.segs.map(s=>({text:s.text,url:s.url}))});
  render();
}
window.regenImg=async function(i){
  if(S.studio.busy)return;S.studio.busy=true;

// ─── AUDIO ────────────────────────────
async function genAudio(){
  const clean=cleanTTS(S.studio.script);if(!clean)throw new Error('Script vide');
  try{return await ttsProxy(clean);}catch(e){return await ttsWS(clean);}
}
async function ttsProxy(text){
  const cks=chunk(text,180),ctx=new(window.AudioContext||window.webkitAudioContext)(),bufs=[];
  for(const c of cks){
    const url=`https://translate.google.com/translate_tts?ie=UTF-8&tl=fr&client=tw-ob&slow=true&q=${encodeURIComponent(c)}`;
    let ok=false;
    for(const px of['https://api.allorigins.win/raw?url=','https://corsproxy.io/?']){
      try{const r=await fetch(px+encodeURIComponent(url));if(!r.ok)continue;const ab=await r.arrayBuffer();if(ab.byteLength<100)continue;bufs.push(await ctx.decodeAudioData(ab.slice(0)));ok=true;break;}catch(e){}
    }
    if(!ok)throw new Error('TTS failed');
  }
  const sr=bufs[0].sampleRate,len=bufs.reduce((s,b)=>s+b.length,0);
  const cb=ctx.createBuffer(1,len,sr);const ch=cb.getChannelData(0);
  let off=0;for(const b of bufs){ch.set(b.getChannelData(0),off);off+=b.length;}
  ctx.close();return toWav(cb);
}
async function ttsWS(text){
  return new Promise((res,rej)=>{
    if(!window.speechSynthesis){rej(new Error('no speech'));return;}
    const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.82;u.pitch=0.8;
    const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('fr'));if(v)u.voice=v;
    const dur=Math.max(10,(text.split(/\s+/).length/150)*60/0.82);
    u.onstart=()=>res(silWav(22050,Math.ceil(dur*22050)));
    u.onerror=e=>rej(new Error(e.error));
    speechSynthesis.cancel();setTimeout(()=>speechSynthesis.speak(u),100);
  });
}
function toWav(buf){
  const sr=buf.sampleRate,s=buf.getChannelData(0),ds=s.length*2,ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,x)=>{for(let i=0;i<x.length;i++)v.setUint8(o+i,x.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ds,true);
  let o=44;for(let i=0;i<s.length;i++){const x=Math.max(-1,Math.min(1,s[i]));v.setInt16(o,x<0?x*0x8000:x*0x7FFF,true);o+=2;}
  return new Blob([ab],{type:'audio/wav'});
}
function silWav(sr,n){
  const ds=n*2,ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,x)=>{for(let i=0;i<x.length;i++)v.setUint8(o+i,x.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ds,true);return new Blob([ab],{type:'audio/wav'});
}

// ─── DÉTECTION SILENCES ───────────────
function detectSilenceSegments(audioBuffer,options={}){
  const{threshold=0.02,minSilenceDuration=0.4,minSegmentDuration=0.5,frameSize=1024}=options;
  const sampleRate=audioBuffer.sampleRate,totalSamples=audioBuffer.length;
  const mixedData=new Float32Array(totalSamples);
  for(let ch=0;ch<audioBuffer.numberOfChannels;ch++){
    const channelData=audioBuffer.getChannelData(ch);
    for(let i=0;i<totalSamples;i++)mixedData[i]+=channelData[i]/audioBuffer.numberOfChannels;
  }
  const numFrames=Math.ceil(totalSamples/frameSize),rmsValues=new Float32Array(numFrames);
  for(let f=0;f<numFrames;f++){
    const start=f*frameSize,end=Math.min(start+frameSize,totalSamples);
    let sum=0;for(let i=start;i<end;i++)sum+=mixedData[i]*mixedData[i];
    rmsValues[f]=Math.sqrt(sum/(end-start));
  }
  const frameDuration=frameSize/sampleRate,minSilenceFrames=Math.ceil(minSilenceDuration/frameDuration),minSegmentFrames=Math.ceil(minSegmentDuration/frameDuration);
  const isSilence=rmsValues.map(rms=>rms<threshold);
  const segments=[];let inSpeech=false,segmentStart=0,silenceCount=0;
  for(let f=0;f<numFrames;f++){
    if(!isSilence[f]){
      if(!inSpeech){inSpeech=true;segmentStart=f;}
      silenceCount=0;
    }else{
      if(inSpeech){
        silenceCount++;
        if(silenceCount>=minSilenceFrames){
          const segmentEnd=f-silenceCount+1,duration=segmentEnd-segmentStart;
          if(duration>=minSegmentFrames)segments.push({start:(segmentStart*frameDuration).toFixed(3)*1,end:(segmentEnd*frameDuration).toFixed(3)*1});
          inSpeech=false;silenceCount=0;
        }
      }
    }
  }
  if(inSpeech){
    const segmentEnd=numFrames-silenceCount,duration=segmentEnd-segmentStart;
    if(duration>=minSegmentFrames)segments.push({start:(segmentStart*frameDuration).toFixed(3)*1,end:Math.min(segmentEnd*frameDuration,audioBuffer.duration).toFixed(3)*1});
  }
  return segments;
}

// ─── VIDÉO ────────────────────────────
async function genVideo(imgUrls,audioBlob,onProg){
  const W=576,H=1024;
  onProg(5,'Chargement images…');
  const imgs=await Promise.all(imgUrls.map(url=>new Promise(res=>{
    if(!url){res(null);return;}
    const img=new Image();img.crossOrigin='anonymous';
    const t=setTimeout(()=>res(null),30000);
    img.onload=()=>{clearTimeout(t);res(img);};img.onerror=()=>{clearTimeout(t);res(null);};
    img.src=url;
  })));
  const valid=imgs.filter(Boolean);
  if(!valid.length)throw new Error('Aucune image valide');
  onProg(10,`${valid.length} images chargées`);
  const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  let decoded=null;
  try{decoded=await audioCtx.decodeAudioData(await audioBlob.arrayBuffer());}catch(e){console.warn('audio decode',e);}
  const audioDur=decoded?decoded.duration:valid.length*7;
  let segments=[];
  if(decoded){
    segments=detectSilenceSegments(decoded,{threshold:0.02,minSilenceDuration:0.4,minSegmentDuration:0.5});
  }
  if(segments.length<valid.length){
    segments=[];
    const perImg=audioDur/valid.length;
    for(let i=0;i<valid.length;i++)segments.push({start:i*perImg,end:(i+1)*perImg});
  }
  onProg(20,'Montage en cours…');
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
  const dest=audioCtx.createMediaStreamDestination();
  if(decoded){
    const src=audioCtx.createBufferSource();src.buffer=decoded;src.connect(dest);src.connect(audioCtx.destination);src.start(0);
  }
  const vStream=cv.captureStream(30);
  dest.stream.getAudioTracks().forEach(t=>vStream.addTrack(t));
  const mimes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  const rec=new MediaRecorder(vStream,mime?{mimeType:mime,videoBitsPerSecond:3000000}:{});
  const chunks=[];rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  const kbDirs=[
    {sx:1.0,ex:1.12,ox:0,oy:0},{sx:1.12,ex:1.0,ox:0,oy:0},{sx:1.0,ex:1.12,ox:-20,oy:-15},
    {sx:1.0,ex:1.12,ox:20,oy:-10},{sx:1.08,ex:1.0,ox:15,oy:20},{sx:1.0,ex:1.10,ox:-10,oy:15}
  ];
  rec.start(100);
  return new Promise((resolve,reject)=>{
    rec.onstop=()=>resolve(new Blob(chunks,{type:mime||'video/webm'}));
    rec.onerror=reject;
    const t0=performance.now();
    function draw(){
      const elapsed=performance.now()-t0;
      if(elapsed>=audioDur*1000+500){rec.stop();audioCtx.close();onProg(100,'✅ Vidéo prête!');return;}
      let imgIdx=0;
      for(let i=segments.length-1;i>=0;i--){if(elapsed/1000>=segments[i].start){imgIdx=i;break;}}
      imgIdx=Math.min(imgIdx,valid.length-1);
      const seg=segments[imgIdx];
      const dur=(seg.end-seg.start)*1000;
      const prog=Math.min(Math.max((elapsed-seg.start*1000)/dur,0),1);
      const img=valid[imgIdx];
      const kb=kbDirs[imgIdx%kbDirs.length];
      const scale=kb.sx+(kb.ex-kb.sx)*prog;
      const ox=kb.ox*prog,oy=kb.oy*prog;
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      if(img){ctx.save();ctx.translate(W/2+ox,H/2+oy);ctx.scale(scale,scale);ctx.drawImage(img,-W/2,-H/2,W,H);ctx.restore();}
      const g=ctx.createLinearGradient(0,H*0.6,0,H);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.75)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(232,184,64,.5)';ctx.font='bold 12px DM Sans';ctx.textAlign='right';ctx.fillText('Papa Conteur',W-14,22);
      const pct=Math.min(elapsed/(audioDur*1000),1);
      onProg(20+Math.floor(pct*78),`Montage: ${Math.floor(pct*100)}%`);
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  });
}

  </div>`;
}

// ─── EVENTS ───────────────────────────
function on(id,ev,fn){const el=$(id);if(el)el.addEventListener(ev,fn);}
function bindEvents(){
  on('b-newproj','click',()=>{const n=prompt('Nom de la série:');if(!n)return;S.projects.unshift({id:uid(),name:n,characters:[],episodes:[],seed:Math.floor(10000+Math.random()*90000)});save();S.projId=S.projects[0].id;S.view='project';render();});
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{S.projId=el.dataset.open;S.view='project';render();});
  document.querySelectorAll('[data-del]').forEach(el=>el.onclick=e=>{e.stopPropagation();if(confirm('Supprimer cette série ?')){S.projects=S.projects.filter(p=>p.id!==el.dataset.del);save();render();}});
  on('b-home','click',()=>{S.view='home';render();});
  on('b-addchar','click',()=>{const n=prompt('Nom du personnage:');if(!n)return;const d=prompt('Description (en anglais pour les images):');if(!d)return;const r=prompt('Rôle (Principal / Secondaire):')||'Principal';const p=proj();if(!p)return;p.characters.push({id:uid(),name:n,role:r,description:d});save();render();});
  document.querySelectorAll('[data-dc]').forEach(el=>el.onclick=()=>{const p=proj();if(!p)return;p.characters=p.characters.filter(c=>c.id!==el.dataset.dc);save();render();});
  on('b-newep','click',()=>{const p=proj();if(!p)return;const e={id:uid(),title:'Épisode '+(p.episodes.length+1),script:'',audioUrl:null,images:[],videoUrl:null};p.episodes.push(e);save();S.epId=e.id;S.studio=fresh();S.view='studio';render();});
  document.querySelectorAll('[data-oe]').forEach(el=>el.onclick=()=>{S.epId=el.dataset.oe;const e=ep();if(!e)return;S.studio=fresh();S.studio.title=e.title||'';S.studio.script=e.script||'';if(e.audioUrl)S.studio.audioUrl=e.audioUrl;if(e.images?.length)S.studio.segs=e.images.map(i=>({text:i.text||'',prompt:'',url:i.url||'',status:i.url?'done':'idle'}));S.view='studio';render();});
  document.querySelectorAll('[data-ton]').forEach(b=>b.onclick=()=>{S.studio.ton=b.dataset.ton;render();});
  document.querySelectorAll('[data-imod]').forEach(b=>b.onclick=()=>{S.studio.imgModel=b.dataset.imod;render();});
  on('f-etitle','input',e=>S.studio.title=e.target.value);
  on('f-escript','input',e=>{S.studio.script=e.target.value;const b=$('b-s1next');if(b)b.disabled=!e.target.value.trim();});
  on('b-enrich','click',async()=>{const sc=$('f-escript').value.trim()||S.studio.script;if(!sc)return;S.studio.busy=true;S.studio.err=null;render();try{S.studio.script=await enrichScript(sc,S.studio.ton,proj()?.characters||[]);}catch(e){S.studio.err=e.message;}S.studio.busy=false;render();});
  on('b-s1next','click',()=>{S.studio.title=$('f-etitle').value||S.studio.title;S.studio.script=$('f-escript').value||S.studio.script;patchEp({title:S.studio.title,script:S.studio.script});S.studio.step=2;render();});
  on('b-genaud','click',async()=>{S.studio.busy=true;S.studio.err=null;render();try{const b=await genAudio();const u=URL.createObjectURL(b);S.studio.audioBlob=b;S.studio.audioUrl=u;patchEp({audioUrl:u});}catch(e){S.studio.err='Audio: '+e.message;}S.studio.busy=false;render();setTimeout(()=>{const a=$('aud-el');if(a)a.onloadedmetadata=()=>{S.studio.audioDur=a.duration;};},100);});
  on('b-reaud','click',()=>{S.studio.audioUrl=null;S.studio.audioBlob=null;render();});
  on('b-s2back','click',()=>{S.studio.step=1;render();});
  on('b-s2next','click',()=>{const a=$('aud-el');if(a)S.studio.audioDur=a.duration||0;if(!S.studio.segs.length)S.studio.segs=mkSegs(S.studio.script).map(t=>({text:t,prompt:'',url:'',status:'idle'}));S.studio.step=3;render();});
  on('b-genimgs','click',doGenImgs);
  on('b-s3back','click',()=>{S.studio.step=2;render();});
  on('b-s3next','click',()=>{S.studio.step=4;render();});
  on('b-genvid','click',async()=>{const urls=S.studio.segs.filter(s=>s.status==='done'&&s.url).map(s=>s.url);if(!urls.length){alert('Aucune image disponible');return;}if(!S.studio.audioBlob){alert('Génère d\'abord la voix off (étape 2)');return;}S.studio.busy=true;S.studio.err=null;render();try{const b=await genVideo(urls,S.studio.audioBlob,(pct,msg)=>{const pb=$('vpb'),pt=$('vtxt');if(pb)pb.style.width=pct+'%';if(pt)pt.textContent=msg;});S.studio.vidBlob=b;S.studio.vidUrl=URL.createObjectURL(b);patchEp({videoUrl:S.studio.vidUrl});}catch(e){S.studio.err='Vidéo: '+e.message;}S.studio.busy=false;render();});
  on('b-revid','click',()=>{S.studio.vidUrl=null;S.studio.vidBlob=null;render();});
  on('b-s4back','click',()=>{S.studio.step=3;render();});
  on('b-newep2','click',()=>{S.view='project';S.epId=null;S.studio=fresh();render();});
  on('b-backproj','click',()=>{S.view='project';S.epId=null;render();});
}

load();render();
</script>
