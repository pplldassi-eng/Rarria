<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Papa Conteur — Studio TikTok Africain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg:#0D0A08;--bg2:#1A1008;--bg3:#231508;
  --primary:#E85D26;--primary2:#c44d1a;
  --gold:#C4923A;--gold2:#a87830;
  --brown:#3D2314;--brown2:#2a180e;
  --text:#FAF7F2;--text2:#C8A898;--text3:#886050;
  --radius:1.2rem;--radius2:2rem;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--brown);border-radius:2px}

/* TYPOGRAPHY */
h1,h2,h3{font-family:'Playfair Display',serif}
.brand{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 1.5rem;border:none;border-radius:var(--radius);font-family:'Barlow',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;outline:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2);transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#0D0A08}
.btn-gold:hover{background:var(--gold2)}
.btn-brown{background:var(--brown);color:var(--text)}
.btn-brown:hover{background:var(--brown2)}
.btn-ghost{background:transparent;border:2px solid var(--brown);color:var(--text2)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:#8B1A1A;color:#fff}
.btn-danger:hover{background:#6d1414}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-full{width:100%}
.btn-sm{padding:.5rem 1rem;font-size:.85rem}

/* CARDS */
.card{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--radius2);padding:1.5rem}
.card-dark{background:var(--bg3);border:1px solid rgba(61,35,20,.5)}

/* INPUTS */
.input,.textarea,.select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(196,146,58,.2);border-radius:var(--radius);color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;padding:.85rem 1rem;outline:none;transition:border-color .2s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--gold)}
.textarea{resize:vertical;min-height:140px;line-height:1.6}
.select option{background:var(--bg2)}
.label{display:block;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .75rem;border-radius:99px;font-size:.75rem;font-weight:700}
.tag-primary{background:rgba(232,93,38,.2);color:var(--primary)}
.tag-gold{background:rgba(196,146,58,.2);color:var(--gold)}

/* PROGRESS BAR */
.progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .5s ease}

/* LOADER */
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* STEP INDICATOR */
.steps{display:flex;align-items:center;gap:0;margin-bottom:2rem}
.step-item{display:flex;align-items:center;flex:1}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:all .3s}
.step-circle.active{background:var(--primary);color:#fff}
.step-circle.done{background:var(--gold);color:#0D0A08}
.step-circle.pending{background:var(--brown);color:var(--text3)}
.step-line{flex:1;height:2px;background:var(--brown);transition:background .3s}
.step-line.done{background:var(--gold)}
.step-label{font-size:.65rem;text-align:center;color:var(--text3);margin-top:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.center{align-items:center}
.modal{background:var(--bg2);border-radius:var(--radius2) var(--radius2) 0 0;padding:2rem 1.5rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal.center-modal{border-radius:var(--radius2);margin:1rem}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.modal-close{background:var(--brown);border:none;color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid rgba(196,146,58,.15);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
.header-back{background:var(--brown);border:none;color:var(--text2);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-title{font-family:'Playfair Display',serif;font-size:1.1rem;flex:1}
.header-sub{font-size:.75rem;color:var(--text3);font-weight:400}

/* HERO */
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:radial-gradient(ellipse at 50% 0%, rgba(196,146,58,.15) 0%, transparent 70%)}
.hero-icon{font-size:3.5rem;margin-bottom:1rem;display:block}
.hero h1{font-size:2.2rem;margin-bottom:.5rem}
.hero p{color:var(--text2);font-size:1rem;max-width:320px;margin:0 auto}

/* PROJECT GRID */
.projects-grid{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.project-card{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--radius2);padding:1.5rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--gold));opacity:0;transition:opacity .2s}
.project-card:hover::before,.project-card:hover{border-color:rgba(196,146,58,.4);transform:translateY(-2px)}
.project-card-name{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:.5rem}
.project-card-meta{display:flex;gap:.75rem;flex-wrap:wrap}
.project-card-actions{display:flex;gap:.5rem;margin-top:1rem}

/* CHARACTER CARD */
.char-card{background:var(--bg3);border:1px solid rgba(61,35,20,.7);border-radius:var(--radius);padding:1rem;display:flex;align-items:center;gap:1rem}
.char-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.char-info{flex:1;min-width:0}
.char-name{font-weight:700;margin-bottom:.2rem}
.char-desc{font-size:.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-actions{display:flex;gap:.4rem}
.char-btn{background:var(--brown);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.char-btn:hover{background:var(--primary)}
.char-btn.del:hover{background:#8B1A1A}

/* EPISODE CARD */
.ep-card{background:var(--bg3);border:1px solid rgba(61,35,20,.5);border-radius:var(--radius);padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .2s}
.ep-card:hover{border-color:rgba(196,146,58,.3);background:var(--bg2)}
.ep-num{width:40px;height:40px;border-radius:50%;background:var(--brown);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.ep-info{flex:1}
.ep-title{font-weight:700;margin-bottom:.2rem}
.ep-status{font-size:.75rem;color:var(--text3)}
.ep-arrow{color:var(--text3);font-size:1.1rem}

/* STUDIO */
.studio-content{padding:1.5rem;flex:1}
.field-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
.ton-selector{display:flex;gap:.75rem}
.ton-btn{flex:1;padding:.75rem;background:var(--brown);border:2px solid transparent;border-radius:var(--radius);color:var(--text2);font-family:'Barlow',sans-serif;font-weight:700;cursor:pointer;transition:all .2s}
.ton-btn.active{background:rgba(232,93,38,.2);border-color:var(--primary);color:var(--primary)}

/* IMAGE GRID */
.images-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.image-slot{aspect-ratio:9/16;background:var(--bg3);border:2px solid var(--brown);border-radius:var(--radius);overflow:hidden;position:relative}
.image-slot img{width:100%;height:100%;object-fit:cover}
.image-slot .img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;opacity:0;transition:opacity .2s}
.image-slot:hover .img-overlay{opacity:1}
.image-slot .img-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(13,10,8,.7)}
.image-slot .img-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:rgba(139,26,26,.2)}
.img-counter{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1rem}

/* VIDEO PREVIEW */
.video-preview{aspect-ratio:9/16;background:#000;border-radius:var(--radius);overflow:hidden;position:relative;max-height:60vh}
.video-preview canvas{width:100%;height:100%;object-fit:contain}
.preview-controls{display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1rem}
.preview-btn{background:var(--brown);border:none;color:var(--text);width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.preview-btn:hover{background:var(--primary)}

/* AUDIO PLAYER */
.audio-player{background:var(--bg3);border:1px solid var(--brown);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:.75rem}
audio{width:100%;height:36px;outline:none}
audio::-webkit-media-controls-panel{background:var(--bg3)}

/* ALERT */
.alert{padding:1rem;border-radius:var(--radius);font-size:.9rem;display:flex;align-items:flex-start;gap:.75rem}
.alert-error{background:rgba(139,26,26,.2);border:1px solid rgba(139,26,26,.5);color:#ff8080}
.alert-success{background:rgba(34,85,34,.2);border:1px solid rgba(34,85,34,.5);color:#80cc80}
.alert-info{background:rgba(196,146,58,.1);border:1px solid rgba(196,146,58,.3);color:var(--gold)}

/* KEN BURNS ANIMATION */
@keyframes kenburns{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.12) translate(-2%,-2%)}}
@keyframes kenburns2{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.12) translate(2%,-1%)}}
@keyframes kenburns3{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.1) translate(-1%,2%)}}

/* UTILS */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-1{gap:.5rem}.gap-2{gap:1rem}.flex-1{flex:1}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}.mt-4{margin-top:2rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}.mb-3{margin-bottom:1.5rem}
.text-center{text-align:center}.text-sm{font-size:.85rem}.text-xs{font-size:.75rem}
.text-gold{color:var(--gold)}.text-primary{color:var(--primary)}.text-muted{color:var(--text3)}
.font-bold{font-weight:700}.italic{font-style:italic}
.hidden{display:none}.w-full{width:100%}
.sep{height:1px;background:rgba(196,146,58,.1);margin:1.5rem 0}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const GEMINI_KEY = 'AIzaSyAHKg5bDVncp4xOtu04SUoHSDqZeqWI3do';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_KEY}`;
const CORS_PROXY = 'https://corsproxy.io/?';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  view: 'home',
  projects: [],
  currentProjectId: null,
  currentEpisodeId: null,
  studio: {
    step: 1,
    title: '',
    script: '',
    ton: 'Mystérieux',
    audioBlob: null,
    audioUrl: null,
    segments: [],
    videoBlob: null,
    videoUrl: null,
    isEnriching: false,
    isGeneratingAudio: false,
    isGeneratingImages: false,
    isGeneratingVideo: false,
    videoProgress: 0,
    imagesReady: 0,
    error: null,
    audioDuration: 0,
  }
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('papaconteur_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.projects = parsed.projects || [];
    }
  } catch(e) { state.projects = []; }
}

function saveState() {
  try {
    localStorage.setItem('papaconteur_v2', JSON.stringify({ projects: state.projects }));
  } catch(e) {}
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function getCurrentProject() {
  return state.projects.find(p => p.id === state.currentProjectId);
}

function getCurrentEpisode() {
  const proj = getCurrentProject();
  if (!proj) return null;
  return proj.episodes.find(e => e.id === state.currentEpisodeId);
}

function updateEpisode(data) {
  const proj = getCurrentProject();
  if (!proj) return;
  const idx = proj.episodes.findIndex(e => e.id === state.currentEpisodeId);
  if (idx >= 0) {
    proj.episodes[idx] = { ...proj.episodes[idx], ...data };
    saveState();
  }
}

function splitIntoChunks(text, maxLen) {
  const chunks = [];
  let current = text.trim();
  while (current.length > 0) {
    if (current.length <= maxLen) { chunks.push(current); break; }
    let split = current.lastIndexOf(' ', maxLen);
    if (split === -1) split = maxLen;
    chunks.push(current.substring(0, split).trim());
    current = current.substring(split).trim();
  }
  return chunks.filter(c => c.length > 0);
}

function cleanScriptForTTS(text) {
  return text
    .replace(/\[.*?\]/g, ' ')
    .replace(/\*+/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/  +/g, ' ')
    .trim();
}

function scriptToSegments(script) {
  return script
    .split(/\n\n+/)
    .map(p => p.trim())
    .filter(p => p.length > 0)
    .slice(0, 6);
}

// ═══════════════════════════════════════
// GEMINI API
// ═══════════════════════════════════════
async function callGemini(prompt) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  try {
    const resp = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
      })
    });
    clearTimeout(timeout);
    if (!resp.ok) throw new Error(`Gemini erreur ${resp.status}`);
    const data = await resp.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error('IA trop lente — réessaie');
    throw e;
  }
}

async function enrichScript(script, ton, characters) {
  const charList = characters.length > 0
    ? `Personnages de l'histoire:\n${characters.map(c => `- ${c.name} (${c.role}): ${c.description}`).join('\n')}`
    : '';

  const prompt = `Tu es un vieux conteur africain mystérieux.
Enrichis ce script TikTok avec ces règles STRICTES:

1. ACCROCHE: La première phrase doit être un choc immédiat en moins de 10 mots.
2. INDICATIONS: Ajoute entre crochets sur des lignes séparées uniquement: [SILENCE], [SUSPENSE], [FORET], [TAMBOUR], [CHUCHOTE], [VENT]
3. FORMAT STRICT:
   - Zéro astérisque
   - Zéro gras, zéro markdown
   - Texte pur uniquement
   - Une phrase par ligne
   - Lignes vides entre paragraphes
4. TENSION: Chaque paragraphe finit sur une note de suspense.
5. Ton demandé: ${ton === 'Mystérieux' ? 'Sombre, suspense maximum, terreur' : 'Chaleureux, paternel, mystère doux'}

${charList}

Script à enrichir:
${script}

Réponds UNIQUEMENT avec le script enrichi. Zéro explication.`;

  return await callGemini(prompt);
}

async function getImagePrompts(segments, characters, ton) {
  const mainChar = characters.find(c => c.role === 'Principal') || characters[0];
  const charDesc = mainChar ? mainChar.description : 'african person';

  const numberedScenes = segments.map((s, i) => `Scène ${i+1}: ${s.substring(0, 200)}`).join('\n\n');

  const prompt = `For each scene below, give exactly 8 descriptive English keywords for a realistic cinematic image.
Return ONLY a JSON array of strings, one per scene.
Example: ["keyword1, keyword2, ...", "keyword1, keyword2, ..."]

Style: ${ton === 'Mystérieux' ? 'dark, terrifying, mysterious, horror' : 'warm, mysterious, african folk tale'}
Main character appearance: ${charDesc}

Scenes:
${numberedScenes}

Return ONLY the JSON array. No explanation.`;

  try {
    const result = await callGemini(prompt);
    const clean = result.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}

  // Fallback
  return segments.map(() => 'mysterious african night, dramatic shadows, moonlight, fog');
}

function buildImageUrl(keywords, charDesc, idx) {
  const seed = Math.floor(Math.random() * 999999) + 1;
  const prompt = `Cinematic dark photography, mysterious african night, ${keywords}, ${charDesc || 'african person'}, old african village atmosphere, moonlight, dramatic shadows, deep fog, ultra realistic, 8k quality, no cartoon, no drawing, no painting`;
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=576&height=1024&nologo=true&model=flux&seed=${seed}`;
}

// ═══════════════════════════════════════
// TTS — Google Translate via CORS Proxy
// ═══════════════════════════════════════
async function generateTTS(text) {
  const clean = cleanScriptForTTS(text);
  if (!clean) throw new Error('Texte vide');

  const chunks = splitIntoChunks(clean, 180);
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buffers = [];

  for (let i = 0; i < chunks.length; i++) {
    const chunk = chunks[i];
    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=fr&client=tw-ob&slow=true&q=${encodeURIComponent(chunk)}`;
    const proxyUrl = `${CORS_PROXY}${encodeURIComponent(ttsUrl)}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    try {
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);
      if (!resp.ok) throw new Error(`TTS segment ${i+1} échoué`);
      const arr = await resp.arrayBuffer();
      const decoded = await audioCtx.decodeAudioData(arr);
      buffers.push(decoded);
    } catch(e) {
      clearTimeout(timeout);
      throw new Error(`Erreur audio segment ${i+1}: ${e.message}`);
    }
  }

  if (buffers.length === 0) throw new Error('Aucun audio généré');

  // Concatenate buffers
  const sampleRate = buffers[0].sampleRate;
  const totalLength = buffers.reduce((s, b) => s + b.length, 0);
  const combined = audioCtx.createBuffer(1, totalLength, sampleRate);
  const channelData = combined.getChannelData(0);
  let offset = 0;
  for (const buf of buffers) {
    channelData.set(buf.getChannelData(0), offset);
    offset += buf.length;
  }

  // Convert AudioBuffer to WAV Blob
  const wavBlob = audioBufferToWav(combined);
  audioCtx.close();
  return wavBlob;
}

function audioBufferToWav(buffer) {
  const numChannels = 1;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const samples = buffer.getChannelData(0);
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = samples.length * bytesPerSample;
  const bufferSize = 44 + dataSize;
  const ab = new ArrayBuffer(bufferSize);
  const view = new DataView(ab);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset2 = 44;
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset2 += 2;
  }

  return new Blob([ab], { type: 'audio/wav' });
}

// ═══════════════════════════════════════
// VIDEO GENERATION
// ═══════════════════════════════════════
async function generateVideo(imageUrls, audioBlob, onProgress) {
  return new Promise(async (resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = 576;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // Load images
    onProgress(5, 'Chargement des images...');
    const imgs = await Promise.all(imageUrls.map(url => new Promise(res => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => res(img);
      img.onerror = () => res(null);
      img.src = url;
    })));

    // Setup audio
    const audioUrl = URL.createObjectURL(audioBlob);
    const audioEl = new Audio(audioUrl);
    audioEl.crossOrigin = 'anonymous';

    await new Promise(res => {
      audioEl.onloadedmetadata = res;
      audioEl.onerror = () => res();
      audioEl.load();
    });

    const audioDuration = audioEl.duration || 60;
    const durationPerImage = (audioDuration * 1000) / Math.max(imgs.length, 1);

    onProgress(15, 'Configuration du montage...');

    // Create streams
    let videoStream, audioStream;
    try {
      videoStream = canvas.captureStream(30);
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(audioEl);
      const dest = audioCtx.createMediaStreamDestination();
      source.connect(dest);
      source.connect(audioCtx.destination);
      audioStream = dest.stream;
    } catch(e) {
      // Fallback: video only
      videoStream = canvas.captureStream(30);
      audioStream = null;
    }

    const tracks = [...videoStream.getTracks()];
    if (audioStream) tracks.push(...audioStream.getAudioTracks());
    const combined = new MediaStream(tracks);

    // Choose codec
    let mimeType = 'video/webm;codecs=vp8,opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';

    const recorder = new MediaRecorder(combined, mimeType ? { mimeType } : {});
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mimeType || 'video/webm' });
      resolve(blob);
    };

    recorder.onerror = reject;
    recorder.start(100);

    onProgress(20, 'Enregistrement en cours...');

    // Draw first frame immediately
    const kenBurnsVariants = [
      (p) => ({ sx: 1 + p * 0.12, tx: -p * 10, ty: -p * 10 }),
      (p) => ({ sx: 1 + p * 0.12, tx: p * 10, ty: -p * 5 }),
      (p) => ({ sx: 1 + p * 0.1, tx: -p * 5, ty: p * 10 }),
    ];

    // Draw black frame first
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 576, 1024);

    const startTime = performance.now();

    function draw() {
      const elapsed = performance.now() - startTime;
      const imgIdx = Math.min(Math.floor(elapsed / durationPerImage), imgs.length - 1);
      const imgProgress = (elapsed % durationPerImage) / durationPerImage;
      const img = imgs[imgIdx];
      const kb = kenBurnsVariants[imgIdx % kenBurnsVariants.length](imgProgress);

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 576, 1024);

      if (img) {
        ctx.save();
        ctx.translate(288 + kb.tx, 512 + kb.ty);
        ctx.scale(kb.sx, kb.sx);
        ctx.drawImage(img, -288, -512, 576, 1024);
        ctx.restore();
      }

      // Progress overlay
      const totalProg = Math.min(elapsed / (audioDuration * 1000), 1);
      onProgress(20 + Math.floor(totalProg * 75), `Montage: ${Math.floor(totalProg * 100)}%`);

      if (elapsed < audioDuration * 1000 + 500) {
        requestAnimationFrame(draw);
      } else {
        recorder.stop();
        onProgress(100, 'Montage terminé ✅');
      }
    }

    audioEl.play().catch(() => {});
    requestAnimationFrame(draw);
  });
}

      ${s.isEnriching ? '<div class="spinner"></div> Enrichissement...' : '✨ Enrichir avec l\'IA'}
    </button>
    <button class="btn btn-primary btn-full" id="btn-step1-next" ${s.script.trim()?'':'disabled'}>
      ✅ Script prêt → Voix Off
    </button>`;

  else if (s.step === 2) {
    content = `
    <div class="card text-center mb-3">
      <div style="font-size:2rem;margin-bottom:.75rem">🎙</div>
      <h3 style="margin-bottom:.5rem">Génération de la Voix</h3>
      <p class="text-muted text-sm">Voix féminine française — posée et mystérieuse</p>

        <div class="flex items-center gap-1 mb-1">
          <span style="color:var(--gold)">✅</span>

        </div>
        <audio controls src="${s.audioUrl}" id="audio-preview"></audio>
        <button class="btn btn-ghost btn-sm mt-1" id="btn-regen-audio">↺ Regénérer</button>
      </div>
    ` : `
      <button class="btn btn-primary btn-full mb-3" id="btn-gen-audio" ${s.isGeneratingAudio?'disabled':''}>
        ${s.isGeneratingAudio ? '<div class="spinner"></div> Génération audio...' : '🎙 Générer la voix'}

      <button class="btn btn-ghost flex-1" id="btn-step2-back">← Retour</button>

  else if (s.step === 4) {

        ` : ''}
        <button class="btn btn-primary btn-full mb-2" id="btn-gen-video" ${s.isGeneratingVideo?'disabled':''}>
          ${s.isGeneratingVideo ? '<div class="spinner"></div> Montage en cours...' : '🎬 Créer la vidéo MP4'}
        </button>
      `}

      <div class="sep"></div>

      <button class="btn btn-brown btn-full" id="btn-download-zip" ${s.isZipping?'disabled':''}>
        ${s.isZipping ? '<div class="spinner"></div>' : '📦'} Exporter ZIP (images + audio)
      </button>
    </div>

    <div class="flex gap-2">
      <button class="btn btn-ghost flex-1" id="btn-step4-back">← Retour</button>
      <button class="btn btn-gold flex-1" id="btn-new-episode">🔄 Nouvel épisode</button>

// EVENT HANDLERS
// ═══════════════════════════════════════
function attachEvents() {
  // HOME
  on('btn-create-project', 'click', () => show('modal-create'));
  on('close-modal-create', 'click', () => hide('modal-create'));
  on('confirm-create-project', 'click', createProject);

  // Project cards
  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openProject(el.dataset.open);
    });
  });
  document.querySelectorAll('[data-delete]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      deleteProject(el.dataset.delete);
    });
  });

  // PROJECT
  on('btn-back-home', 'click', () => navigate('home'));
  on('btn-add-char', 'click', () => show('modal-add-char'));
  on('close-modal-char', 'click', () => hide('modal-add-char'));
  on('confirm-add-char', 'click', addCharacter);
  on('btn-create-ep', 'click', createEpisode);

  document.querySelectorAll('[data-open-ep]').forEach(el => {
    el.addEventListener('click', () => openEpisode(el.dataset.openEp));
  });
  document.querySelectorAll('[data-del-char]').forEach(el => {
    el.addEventListener('click', () => deleteCharacter(el.dataset.delChar));
  });

  // STUDIO STEP 1
  on('ep-title', 'input', e => { state.studio.title = e.target.value; });
  on('ep-script', 'input', e => {
    state.studio.script = e.target.value;
    const btn = $('btn-step1-next');
    if (btn) btn.disabled = !e.target.value.trim();
  });
  document.querySelectorAll('.ton-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.studio.ton = btn.dataset.ton;
      render();
    });
  });
  on('btn-enrich', 'click', doEnrich);
  on('btn-step1-next', 'click', () => {
    state.studio.title = $('ep-title')?.value || state.studio.title;
    state.studio.script = $('ep-script')?.value || state.studio.script;
    updateEpisode({ title: state.studio.title, script: state.studio.script });
    state.studio.step = 2;
    state.studio.error = null;
    render();
  });

  // STUDIO STEP 2
  on('btn-gen-audio', 'click', doGenerateAudio);
  on('btn-regen-audio', 'click', () => {
    state.studio.audioUrl = null;
    state.studio.audioBlob = null;
    state.studio.isGeneratingAudio = false;
    render();
  });
  on('btn-step2-back', 'click', () => { state.studio.step = 1; render(); });
  on('btn-step2-next', 'click', () => {
    const audioEl = $('audio-preview');
    if (audioEl) state.studio.audioDuration = audioEl.duration || 0;
    state.studio.step = 3;
    state.studio.error = null;
    initSegments();
    render();
  });

  // STUDIO STEP 3
  on('btn-gen-all-images', 'click', doGenerateAllImages);
  on('btn-step3-back', 'click', () => { state.studio.step = 2; render(); });
  on('btn-step3-next', 'click', () => { state.studio.step = 4; state.studio.error = null; render(); });

  // STUDIO STEP 4
  on('btn-gen-video', 'click', doGenerateVideo);
  on('btn-regen-video', 'click', () => {
    state.studio.videoUrl = null;
    state.studio.videoBlob = null;
    render();
  });
  on('btn-download-zip', 'click', doDownloadZip);
  on('btn-step4-back', 'click', () => { state.studio.step = 3; render(); });
  on('btn-new-episode', 'click', () => {
    state.view = 'project';
    state.currentEpisodeId = null;
    resetStudio();
    render();
  });
  on('btn-back-project', 'click', () => {
    state.view = 'project';
    state.currentEpisodeId = null;
    render();
  });
}

function on(id, event, fn) {
  const el = $(id);
  if (el) el.addEventListener(event, fn);
}
function show(id) { const el=$(id); if(el) el.classList.remove('hidden'); }
function hide(id) { const el=$(id); if(el) el.classList.add('hidden'); }
function navigate(view) { state.view = view; render(); }

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function createProject() {
  const name = $('new-project-name')?.value?.trim();
  if (!name) { alert('Donne un nom à la série'); return; }

  const proj = {
    id: uid(),
    name,
    description: $('new-project-desc')?.value?.trim() || '',
    characters: [],
    episodes: [],
    createdAt: new Date().toISOString()
  };
  state.projects.unshift(proj);
  saveState();
  state.currentProjectId = proj.id;
  state.view = 'project';
  render();
}

function deleteProject(id) {
  if (!confirm('Supprimer cette série et tous ses épisodes ?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  saveState();
  render();
}

function openProject(id) {
  state.currentProjectId = id;
  state.view = 'project';
  render();
}

function addCharacter() {
  const name = $('char-name')?.value?.trim();
  const desc = $('char-desc')?.value?.trim();
  if (!name || !desc) { alert('Remplis le nom et la description'); return; }

  const proj = getCurrentProject();
  if (!proj) return;

  proj.characters.push({
    id: uid(),
    name,
    role: $('char-role')?.value || 'Principal',
    description: desc
  });
  saveState();
  hide('modal-add-char');
  render();
}

function deleteCharacter(id) {
  const proj = getCurrentProject();
  if (!proj) return;
  proj.characters = proj.characters.filter(c => c.id !== id);
  saveState();
  render();
}

function createEpisode() {
  const proj = getCurrentProject();
  if (!proj) return;

  const ep = {
    id: uid(),
    title: `Épisode ${proj.episodes.length + 1}`,
    script: '',
    audioUrl: null,
    images: [],
    videoUrl: null,
    createdAt: new Date().toISOString()
  };
  proj.episodes.push(ep);
  saveState();
  openEpisode(ep.id);
}

function openEpisode(id) {
  state.currentEpisodeId = id;
  const ep = getCurrentEpisode();
  if (!ep) return;

  resetStudio();
  state.studio.title = ep.title || '';
  state.studio.script = ep.script || '';
  if (ep.audioUrl) {
    state.studio.audioUrl = ep.audioUrl;
  }
  if (ep.images && ep.images.length > 0) {
    state.studio.segments = ep.images.map(img => ({
      text: img.text || '',
      imageUrl: img.url || '',
      status: img.url ? 'done' : 'idle'
    }));
  }
  if (ep.videoUrl) state.studio.videoUrl = ep.videoUrl;

  state.view = 'studio';
  render();
}

function resetStudio() {
  state.studio = {
    step: 1, title: '', script: '', ton: 'Mystérieux',
    audioBlob: null, audioUrl: null, segments: [],
    videoBlob: null, videoUrl: null,
    isEnriching: false, isGeneratingAudio: false,
    isGeneratingImages: false, isGeneratingVideo: false,
    videoProgress: 0, imagesReady: 0, error: null, audioDuration: 0
  };
}

function initSegments() {
  const segs = scriptToSegments(state.studio.script);
  if (state.studio.segments.length === 0 || state.studio.segments.length !== segs.length) {
    state.studio.segments = segs.map(text => ({ text, imageUrl: '', status: 'idle', prompt: '' }));
  }
}

// ═══ ENRICH ═══
async function doEnrich() {
  const scriptEl = $('ep-script');
  const script = scriptEl?.value?.trim() || state.studio.script;
  if (!script) return;

  state.studio.isEnriching = true;
  state.studio.error = null;
  state.studio.script = script;
  render();

  try {
    const proj = getCurrentProject();
    const chars = proj ? proj.characters : [];
    const result = await enrichScript(script, state.studio.ton, chars);
    state.studio.script = result;
    state.studio.isEnriching = false;
    render();
  } catch(e) {
    state.studio.isEnriching = false;
    state.studio.error = e.message;
    render();
  }
}

// ═══ AUDIO ═══
async function doGenerateAudio() {
  state.studio.isGeneratingAudio = true;
  state.studio.error = null;
  render();

  try {
    const blob = await generateTTS(state.studio.script);
    const url = URL.createObjectURL(blob);
    state.studio.audioBlob = blob;
    state.studio.audioUrl = url;
    state.studio.isGeneratingAudio = false;

    // Save reference (base64 too large, just keep blob URL in session)
    updateEpisode({ audioUrl: url });
    render();

    // Get duration
    setTimeout(() => {
      const audioEl = $('audio-preview');
      if (audioEl) {
        audioEl.onloadedmetadata = () => {
          state.studio.audioDuration = audioEl.duration;
        };
      }
    }, 100);
  } catch(e) {
    state.studio.isGeneratingAudio = false;
    state.studio.error = `Erreur audio: ${e.message}`;
    render();
  }
}

// ═══ IMAGES ═══
async function doGenerateAllImages() {
  if (state.studio.isGeneratingImages) return;

  state.studio.isGeneratingImages = true;
  state.studio.error = null;
  initSegments();

  // Set all to loading
  state.studio.segments = state.studio.segments.map(s => ({ ...s, status: 'loading', imageUrl: '' }));
  render();

  try {
    const proj = getCurrentProject();
    const chars = proj ? proj.characters : [];
    const segs = state.studio.segments.map(s => s.text);

    // Get prompts from Gemini
    let keywords;
    try {
      keywords = await getImagePrompts(segs, chars, state.studio.ton);
    } catch(e) {
      keywords = segs.map(() => 'mysterious african night, dramatic shadows, moonlight, fog');
    }

    const mainChar = chars.find(c => c.role === 'Principal') || chars[0];
    const charDesc = mainChar ? mainChar.description : '';

    // Set image URLs
    state.studio.segments = state.studio.segments.map((s, i) => ({
      ...s,
      imageUrl: buildImageUrl(keywords[i] || keywords[0] || 'mysterious african', charDesc, i),
      status: 'loading'
    }));
    state.studio.isGeneratingImages = false;
    render();

    // Save to episode
    updateEpisode({
      images: state.studio.segments.map(s => ({ text: s.text, url: s.imageUrl }))
    });
  } catch(e) {
    state.studio.isGeneratingImages = false;
    state.studio.error = `Erreur images: ${e.message}`;
    render();
  }
}

// Called by img onload/onerror
window.onImageLoad = function(idx) {
  if (state.studio.segments[idx]) {
    state.studio.segments[idx].status = 'done';
    const readyCount = state.studio.segments.filter(s => s.status === 'done').length;
    const counter = document.querySelector('.img-counter');
    if (counter) counter.textContent = `${readyCount}/${state.studio.segments.length} images`;
  }
};

window.onImageError = function(idx) {
  const seg = state.studio.segments[idx];
  if (!seg || seg.retries >= 3) {
    if (seg) seg.status = 'error';
    return;
  }
  seg.retries = (seg.retries || 0) + 1;
  // Change seed to retry
  const newSeed = Math.floor(Math.random() * 999999) + 1;
  seg.imageUrl = seg.imageUrl.replace(/seed=\d+/, `seed=${newSeed}`);
  seg.status = 'loading';
  const slot = $(`slot-${idx}`);
  if (slot) {
    const img = slot.querySelector('img');
    if (img) img.src = seg.imageUrl;
  }
};

window.regenImage = function(idx) {
  const seg = state.studio.segments[idx];
  if (!seg) return;
  seg.retries = 0;
  seg.status = 'loading';
  const newSeed = Math.floor(Math.random() * 999999) + 1;
  seg.imageUrl = seg.imageUrl
    ? seg.imageUrl.replace(/seed=\d+/, `seed=${newSeed}`)
    : buildImageUrl('mysterious african night', '', idx);
  const slot = $(`slot-${idx}`);
  if (slot) {
    slot.innerHTML = `<div class="img-loading"><div class="spinner"></div></div>`;
    setTimeout(() => {
      if (slot) {
        slot.innerHTML = `<img src="${seg.imageUrl}" alt="" onload="onImageLoad(${idx})" onerror="onImageError(${idx})" style="width:100%;height:100%;object-fit:cover">`;
      }
    }, 100);
  }
};

window.importImage = function(idx, input) {
  const file = input.files?.[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  state.studio.segments[idx] = { ...state.studio.segments[idx], imageUrl: url, status: 'done' };
  const slot = $(`slot-${idx}`);
  if (slot) {
    slot.innerHTML = `
      <img src="${url}" alt="" style="width:100%;height:100%;object-fit:cover">
      <div class="img-overlay">
        <button class="btn btn-primary btn-sm" onclick="regenImage(${idx})">↺ Régénérer</button>
        <label class="btn btn-brown btn-sm" style="cursor:pointer">
          📁 Importer
          <input type="file" accept="image/*" style="display:none" onchange="importImage(${idx}, this)">
        </label>
      </div>`;
  }
};

// ═══ VIDEO ═══
async function doGenerateVideo() {
  state.studio.isGeneratingVideo = true;
  state.studio.videoProgress = 0;
  state.studio.error = null;
  render();

  try {
    const imageUrls = state.studio.segments
      .filter(s => s.imageUrl && s.status === 'done')
      .map(s => s.imageUrl);

    if (imageUrls.length === 0) throw new Error('Aucune image disponible');
    if (!state.studio.audioBlob) throw new Error('Aucun audio disponible');

    const onProgress = (pct, msg) => {
      state.studio.videoProgress = pct;
      const bar = $('video-prog-bar');
      const txt = $('video-prog-text');
      if (bar) bar.style.width = pct + '%';
      if (txt) txt.textContent = msg;
    };

    const blob = await generateVideo(imageUrls, state.studio.audioBlob, onProgress);
    const url = URL.createObjectURL(blob);

    state.studio.videoBlob = blob;
    state.studio.videoUrl = url;
    state.studio.isGeneratingVideo = false;

    updateEpisode({ videoUrl: url });
    render();
  } catch(e) {
    state.studio.isGeneratingVideo = false;
    state.studio.error = `Erreur montage: ${e.message}`;
    render();
  }
}

// ═══ ZIP ═══
async function doDownloadZip() {
  state.studio.isZipping = true;
  state.studio.error = null;
  render();

  try {
    const zip = new JSZip();
    const folder = zip.folder('papa_conteur');

    // Add images
    const imgBlobs = await Promise.all(
      state.studio.segments.filter(s => s.imageUrl).map(async (s, i) => {
        try {
          const resp = await fetch(s.imageUrl);
          const blob = await resp.blob();
          return { idx: i + 1, blob };
        } catch(e) { return null; }
      })
    );

    imgBlobs.filter(Boolean).forEach(({ idx, blob }) => {
      folder.file(`${String(idx).padStart(2,'0')}_image.jpg`, blob);
    });

    // Add audio
    if (state.studio.audioBlob) {
      folder.file('voix_off.wav', state.studio.audioBlob);
    }

    // Add notice
    folder.file('instructions.txt',
      `PAPA CONTEUR — ${state.studio.title}\n\n` +
      `1. Ouvre CapCut → Nouveau projet\n` +
      `2. Importe les images dans l'ordre (01, 02...)\n` +
      `3. Durée totale images = durée de voix_off.wav\n` +
      `4. Ajoute voix_off.wav sur la piste audio\n` +
      `5. Volume musique fond = 15%\n` +
      `6. Exporte en 1080x1920\n`
    );

    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `papa_conteur_${state.studio.title || 'episode'}.zip`;
    a.click();

    state.studio.isZipping = false;
    render();
  } catch(e) {
    state.studio.isZipping = false;
    state.studio.error = `Erreur ZIP: ${e.message}`;
    render();
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadState();
render();
</script>
