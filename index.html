<style>
:root{--bg:#0D0A08;--bg2:#1A1008;--bg3:#231508;--primary:#E85D26;--primary2:#c44d1a;--gold:#C4923A;--gold2:#a87830;--brown:#3D2314;--brown2:#2a180e;--text:#FAF7F2;--text2:#C8A898;--text3:#886050;--r:1.2rem;--r2:2rem}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brown);border-radius:2px}
h1,h2,h3{font-family:'Playfair Display',serif}
.brand{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 1.5rem;border:none;border-radius:var(--r);font-family:'Barlow',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;outline:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2)}
.btn-gold{background:var(--gold);color:#0D0A08}.btn-gold:hover{background:var(--gold2)}
.btn-brown{background:var(--brown);color:var(--text)}.btn-brown:hover{background:var(--brown2)}
.btn-ghost{background:transparent;border:2px solid var(--brown);color:var(--text2)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:#8B1A1A;color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}.btn-full{width:100%}.btn-sm{padding:.5rem 1rem;font-size:.85rem}
.card{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--r2);padding:1.5rem}
.input,.textarea,.select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(196,146,58,.2);border-radius:var(--r);color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;padding:.85rem 1rem;outline:none;transition:border-color .2s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--gold)}
.textarea{resize:vertical;min-height:140px;line-height:1.6}.select option{background:var(--bg2)}
.label{display:block;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.tag{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .75rem;border-radius:99px;font-size:.75rem;font-weight:700}
.tag-p{background:rgba(232,93,38,.2);color:var(--primary)}.tag-g{background:rgba(196,146,58,.2);color:var(--gold)}
.pbar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin:.5rem 0}
.pfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .4s}
.spin{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.steps{display:flex;align-items:center;margin-bottom:2rem}
.step-item{display:flex;align-items:center;flex:1}
.sc{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:all .3s}
.sc.active{background:var(--primary);color:#fff}.sc.done{background:var(--gold);color:#0D0A08}.sc.pend{background:var(--brown);color:var(--text3)}
.sl{flex:1;height:2px;background:var(--brown);margin-bottom:1.2rem}.sl.done{background:var(--gold)}
.slabel{font-size:.6rem;text-align:center;color:var(--text3);margin-top:.3rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.overlay-m{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:var(--r2) var(--r2) 0 0;padding:2rem 1.5rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.mclose{background:var(--brown);border:none;color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.hdr{background:var(--bg2);border-bottom:1px solid rgba(196,146,58,.15);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
.hback{background:var(--brown);border:none;color:var(--text2);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htitle{font-family:'Playfair Display',serif;font-size:1.1rem;flex:1}
.hsub{font-size:.75rem;color:var(--text3);font-weight:400}
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:radial-gradient(ellipse at 50% 0%,rgba(196,146,58,.15) 0%,transparent 70%)}
.hero-ico{font-size:3.5rem;margin-bottom:1rem;display:block}
.pgrid{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.pcard{background:var(--bg2);border:1px solid rgba(196,146,58,.15);border-radius:var(--r2);padding:1.5rem;transition:all .2s}
.pcard:hover{border-color:rgba(196,146,58,.4);transform:translateY(-2px)}
.pname{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:.5rem}
.pmeta{display:flex;gap:.75rem;flex-wrap:wrap}.pact{display:flex;gap:.5rem;margin-top:1rem}
.ccard{background:var(--bg3);border:1px solid rgba(61,35,20,.7);border-radius:var(--r);padding:1rem;display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.cava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cinfo{flex:1;min-width:0}.cname{font-weight:700;margin-bottom:.2rem}.cdesc{font-size:.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbtn{background:var(--brown);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.cbtn.del:hover{background:#8B1A1A}
.epcard{background:var(--bg3);border:1px solid rgba(61,35,20,.5);border-radius:var(--r);padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .2s;margin-bottom:.5rem}
.epcard:hover{border-color:rgba(196,146,58,.3);background:var(--bg2)}
.epnum{width:40px;height:40px;border-radius:50%;background:var(--brown);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.epinfo{flex:1}.eptitle{font-weight:700;margin-bottom:.2rem}.epst{font-size:.75rem;color:var(--text3)}
.stu{padding:1.5rem;flex:1}
.fgrp{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
.tsel{display:flex;gap:.75rem}
.tbtn{flex:1;padding:.75rem;background:var(--brown);border:2px solid transparent;border-radius:var(--r);color:var(--text2);font-family:'Barlow',sans-serif;font-weight:700;cursor:pointer;transition:all .2s}
.tbtn.on{background:rgba(232,93,38,.2);border-color:var(--primary);color:var(--primary)}
.alert{padding:1rem;border-radius:var(--r);font-size:.9rem;display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1rem}
.ae{background:rgba(139,26,26,.2);border:1px solid rgba(139,26,26,.5);color:#ff8080}
.as{background:rgba(34,85,34,.2);border:1px solid rgba(34,85,34,.5);color:#80cc80}
.ai{background:rgba(196,146,58,.1);border:1px solid rgba(196,146,58,.3);color:var(--gold)}
.apl{background:var(--bg3);border:1px solid var(--brown);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
audio{width:100%;height:36px;outline:none;margin:.5rem 0}
.sep{height:1px;background:rgba(196,146,58,.1);margin:1.5rem 0}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.islot{aspect-ratio:9/16;background:var(--bg3);border:2px solid var(--brown);border-radius:var(--r);overflow:hidden;position:relative;transition:border-color .3s}
.islot.done{border-color:rgba(196,146,58,.6)}.islot.err{border-color:rgba(139,26,26,.6)}
.islot img{width:100%;height:100%;object-fit:cover;display:block}
.iover{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;opacity:0;transition:opacity .2s}
.islot:hover .iover{opacity:1}
.ibody{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;padding:.5rem;text-align:center}
.ilabel{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.inum{font-size:2rem;font-weight:900;color:rgba(61,35,20,.8);font-family:'Playfair Display',serif}
.ibar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.g1{gap:.5rem}.g2{gap:1rem}.f1{flex:1}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}.mb3{margin-bottom:1.5rem}
.tc{text-align:center}.ts{font-size:.85rem}.tx{font-size:.75rem}
.tg{color:var(--gold)}.tm{color:var(--text3)}.fb{font-weight:700}.hidden{display:none}.wf{width:100%}
</style>

<body>
<div id="app"></div>
<script>
'use strict';
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const getKey=()=>localStorage.getItem('pc_key')||'';

let S={view:'home',projects:[],projId:null,epId:null,studio:fresh()};

function fresh(){
  return{step:1,title:'',script:'',ton:'Mystérieux',imgModel:'schnell',audioBlob:null,audioUrl:null,audioDur:0,segs:[],vidUrl:null,vidBlob:null,busy:false,err:null};
}

function load(){try{const d=JSON.parse(localStorage.getItem('pc5')||'{}');S.projects=d.p||[];}catch(e){S.projects=[];}}
function save(){try{localStorage.setItem('pc5',JSON.stringify({p:S.projects}));}catch(e){}}

const proj=()=>S.projects.find(p=>p.id===S.projId);
const ep=()=>{const p=proj();return p?p.episodes.find(e=>e.id===S.epId):null;};
function patchEp(d){const p=proj();if(!p)return;const i=p.episodes.findIndex(e=>e.id===S.epId);if(i>=0){p.episodes[i]={...p.episodes[i],...d};save();}}

// Always produce minimum 4 segments
function mkSegs(script){
  const c=script.trim();
  if(!c)return[];
  let parts=c.split(/\n\n+/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<3)parts=c.split(/\n/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<3)parts=c.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>3);
  if(parts.length<2)parts=[c,c,c,c];
  while(parts.length<4)parts=[...parts,...parts];
  return parts.slice(0,6);
}

function cleanTTS(t){return t.replace(/\[.*?\]/g,' ').replace(/\*+/g,'').replace(/#{1,6}\s/g,'').replace(/\s{2,}/g,' ').trim();}
function chunk(t,max){const out=[];let cur=t.trim();while(cur.length>0){if(cur.length<=max){out.push(cur);break;}let i=cur.lastIndexOf(' ',max);if(i<0)i=max;out.push(cur.slice(0,i).trim());cur=cur.slice(i).trim();}return out.filter(c=>c.length>0);}

// GEMINI — 3 model cascade
const MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-1.5-flash-8b'];
async function callModel(model,prompt,key){
  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),25000);
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.75,maxOutputTokens:2048}})});
    clearTimeout(t);
    const d=await r.json();
    if(!r.ok){const code=r.status,msg=d.error?.message||'err';if(code===503||code===429||code===500)throw new Error('RETRY:'+code);throw new Error('Gemini '+code+': '+msg);}
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }catch(e){clearTimeout(t);if(e.name==='AbortError')throw new Error('RETRY:timeout');throw e;}
}
async function gemini(prompt){
  const key=getKey();if(!key)throw new Error('Clé Gemini manquante');
  let last=null;
  for(const m of MODELS){try{return await callModel(m,prompt,key);}catch(e){last=e;if(e.message.startsWith('RETRY:')){await sleep(1500);continue;}throw e;}}
  throw new Error('Gemini surchargé — réessaie dans 1 minute');
}
async function enrichScript(script,ton,chars){
  const cl=chars.map(c=>`- ${c.name}(${c.role}): ${c.description}`).join('\n');
  return await gemini(`Tu es un conteur africain mystérieux.\nEnrichis ce script TikTok:\n1. Première phrase = choc en <10 mots\n2. Ajoute [SILENCE][SUSPENSE][TAMBOUR][FORET][CHUCHOTE] sur lignes séparées\n3. Zéro markdown, texte pur, lignes vides entre paragraphes\n4. Chaque para finit en suspense\n5. Ton: ${ton==='Mystérieux'?'sombre terreur':'chaleureux mystère doux'}\n${cl?'Personnages:\n'+cl:''}\nSCRIPT:\n${script}\nUNIQUEMENT le script enrichi.`);
}
async function getKeywords(segs,chars,ton){
  const mc=chars.find(c=>c.role==='Principal')||chars[0];
  const cd=mc?mc.description.slice(0,80):'african person';
  try{
    const raw=await gemini(`Give exactly 6 English keywords per scene for a cinematic photo.\nReturn ONLY a JSON array of strings (one per scene). No markdown.\nStyle: ${ton==='Mystérieux'?'dark horror african cinematic':'warm african folk tale cinematic'}\nCharacter: ${cd}\nScenes:\n${segs.map((s,i)=>`${i+1}. ${s.slice(0,120)}`).join('\n')}\nONLY the JSON array.`);
    const p=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(Array.isArray(p)){while(p.length<segs.length)p.push(p[0]||'mysterious african night');return p;}
  }catch(e){}
  return segs.map(()=>'mysterious african night, dramatic shadows, moonlight, cinematic');
}

// ✅ IMAGE ENGINE — PUTER.JS (no API key, no limit, no black images)
// puter.ai.txt2img() returns an <img> element directly — no URL tricks needed
// Models tried in order: flux-schnell (fast) → gpt-image-1-mini (quality fallback)
// ✅ PUTER.JS IMAGE ENGINE
// imgModel: 'schnell' = fast, 'pro' = best quality
function getPuterModels(imgModel) {
  if(imgModel === 'pro') {
    return [
      'black-forest-labs/flux-1.1-pro',
      'black-forest-labs/flux-2-pro',
      'gpt-image-1-mini',
      'black-forest-labs/flux-schnell',
    ];
  }
  return [
    'black-forest-labs/flux-schnell',
    'black-forest-labs/flux-1.1-pro',
    'gpt-image-1-mini',
    'dall-e-2',
  ];
}

async function genImg(prompt, slotIdx, _seed, maxTries=4) {
  const models = getPuterModels(S.studio.imgModel || 'schnell');
  for(let a=0; a<maxTries; a++){
    const model = models[a % models.length];
    setBadge(slotIdx, `${a+1}/${maxTries} · ${model.split('/').pop()}`);
    console.log(`[img${slotIdx+1}] try${a+1} model=${model}`);
    try {
      const imgEl = await puter.ai.txt2img(prompt, { model });
      if(imgEl && imgEl.src) {
        console.log(`[img${slotIdx+1}] ✅ OK model=${model}`);
        return imgEl.src;
      }
    } catch(e) {
      console.warn(`[img${slotIdx+1}] ${model} failed:`, e.message||e);
      await sleep(1500);
    }
  }
  return null;
}
function setBadge(i,txt){const s=$(`slot-${i}`);if(!s)return;const b=s.querySelector('.ibadge');if(b)b.textContent=txt;}
function drawSlot(i){
  const slot=$(`slot-${i}`);if(!slot)return;
  const seg=S.studio.segs[i];if(!seg)return;
  slot.className=`islot ${seg.status==='done'?'done':seg.status==='err'?'err':''}`;
  if(seg.status==='done'&&seg.url){
    slot.innerHTML=`<img src="${seg.url}" alt=""><div class="iover"><button class="btn btn-primary btn-sm" onclick="regenImg(${i})">↺ Régénérer</button><label class="btn btn-brown btn-sm" style="cursor:pointer">📁 Galerie<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`;
  }else if(seg.status==='loading'){
    slot.innerHTML=`<div class="ibody"><div class="spin"></div><span class="ilabel ibadge">Génération...</span></div>`;
  }else if(seg.status==='err'){
    slot.innerHTML=`<div class="ibody"><span style="font-size:1.5rem">❌</span><span class="ilabel">Échec</span><button class="btn btn-primary btn-sm" onclick="regenImg(${i})">↺ Retry</button><label class="btn btn-brown btn-sm" style="cursor:pointer;font-size:.75rem">📁 Importer<input type="file" accept="image/*" style="display:none" onchange="importImg(${i},this)"></label></div>`;
  }else{
    slot.innerHTML=`<div class="ibody" style="opacity:.3"><span class="inum">${i+1}</span><span class="ilabel">En attente</span></div>`;
  }
}
function updCtr(){
  const done=S.studio.segs.filter(s=>s.status==='done').length,tot=S.studio.segs.length;
  const c=$('img-ctr'),b=$('img-pb');
  if(c)c.textContent=`${done}/${tot} prêtes`;
  if(b)b.style.width=(done/Math.max(tot,1)*100)+'%';
}
async function doGenImgs(){
  if(S.studio.busy)return;
  S.studio.busy=true;S.studio.err=null;
  if(S.studio.segs.length===0)S.studio.segs=mkSegs(S.studio.script).map(text=>({text,prompt:'',url:'',status:'idle'}));
  S.studio.segs=S.studio.segs.map(s=>({...s,url:'',status:'idle'}));
  render();
  const p=proj(),chars=p?p.characters:[],seed=p?.seed||42000;
  let kws;
  try{kws=await getKeywords(S.studio.segs.map(s=>s.text),chars,S.studio.ton);}
  catch(e){kws=S.studio.segs.map(()=>'mysterious african night cinematic shadows moonlight');}
  const mc=chars.find(c=>c.role==='Principal')||chars[0];
  const cd=mc?mc.description.slice(0,60):'african person';
  for(let i=0;i<S.studio.segs.length;i++){
    S.studio.segs[i].status='loading';
    drawSlot(i);
    const pt=$('img-ptxt');if(pt)pt.textContent=`Image ${i+1}/${S.studio.segs.length}...`;
    const kw=kws[i]||kws[0]||'mysterious african night';
    const prompt=`${kw}, ${cd}, dramatic cinematic lighting, photorealistic`;
    S.studio.segs[i].prompt=prompt;
    const url=await genImg(prompt,i,seed+i*137);
    if(url){S.studio.segs[i].url=url;S.studio.segs[i].status='done';}
    else{S.studio.segs[i].status='err';}
    drawSlot(i);updCtr();
    if(i<S.studio.segs.length-1)await sleep(1000);
  }
  S.studio.busy=false;
  patchEp({images:S.studio.segs.map(s=>({text:s.text,url:s.url}))});
  render();
}
window.regenImg=async function(i){
  if(S.studio.busy)return;S.studio.busy=true;
  S.studio.segs[i]={...S.studio.segs[i],url:'',status:'loading'};drawSlot(i);
  const seed=Math.floor(Math.random()*999999)+10000;
  const url=await genImg(S.studio.segs[i].prompt||'mysterious african night cinematic',i,seed,8);
  S.studio.segs[i]={...S.studio.segs[i],url:url||'',status:url?'done':'err'};
  S.studio.busy=false;drawSlot(i);updCtr();
};
window.importImg=function(i,input){
  const f=input.files?.[0];if(!f)return;
  const url=URL.createObjectURL(f);
  S.studio.segs[i]={...S.studio.segs[i],url,status:'done'};
  drawSlot(i);updCtr();
};

// AUDIO
async function genAudio(){
  const clean=cleanTTS(S.studio.script);if(!clean)throw new Error('Script vide');
  try{return await ttsProxy(clean);}catch(e){return await ttsWS(clean);}
}
async function ttsProxy(text){
  const cks=chunk(text,180),ctx=new(window.AudioContext||window.webkitAudioContext)(),bufs=[];
  for(const c of cks){
    const url=`https://translate.google.com/translate_tts?ie=UTF-8&tl=fr&client=tw-ob&slow=true&q=${encodeURIComponent(c)}`;
    let ok=false;
    for(const px of['https://api.allorigins.win/raw?url=','https://corsproxy.io/?']){
      try{const r=await fetch(px+encodeURIComponent(url));if(!r.ok)continue;const ab=await r.arrayBuffer();if(ab.byteLength<100)continue;bufs.push(await ctx.decodeAudioData(ab.slice(0)));ok=true;break;}catch(e){}
    }
    if(!ok)throw new Error('TTS failed');
  }
  const sr=bufs[0].sampleRate,len=bufs.reduce((s,b)=>s+b.length,0);
  const cb=ctx.createBuffer(1,len,sr);const ch=cb.getChannelData(0);
  let off=0;for(const b of bufs){ch.set(b.getChannelData(0),off);off+=b.length;}
  ctx.close();return toWav(cb);
}
async function ttsWS(text){
  return new Promise((res,rej)=>{
    if(!window.speechSynthesis){rej(new Error('no speech'));return;}
    const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.82;u.pitch=0.8;
    const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('fr'));if(v)u.voice=v;
    const dur=Math.max(10,(text.split(/\s+/).length/150)*60/0.82);
    u.onstart=()=>res(silWav(22050,Math.ceil(dur*22050)));
    u.onerror=e=>rej(new Error(e.error));
    speechSynthesis.cancel();setTimeout(()=>speechSynthesis.speak(u),100);
  });
}
function toWav(buf){
  const sr=buf.sampleRate,s=buf.getChannelData(0),ds=s.length*2,ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,x)=>{for(let i=0;i<x.length;i++)v.setUint8(o+i,x.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ds,true);
  let o=44;for(let i=0;i<s.length;i++){const x=Math.max(-1,Math.min(1,s[i]));v.setInt16(o,x<0?x*0x8000:x*0x7FFF,true);o+=2;}
  return new Blob([ab],{type:'audio/wav'});
}
function silWav(sr,n){
  const ds=n*2,ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,x)=>{for(let i=0;i<x.length;i++)v.setUint8(o+i,x.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ds,true);return new Blob([ab],{type:'audio/wav'});
}

// VIDEO — fixed Ken Burns + fixed audio
async function genVideo(imgUrls,audioBlob,onProg){
  const W=576,H=1024;
  onProg(5,'Chargement images...');
  const imgs=await Promise.all(imgUrls.map(url=>new Promise(res=>{
    if(!url){res(null);return;}
    const img=new Image();img.crossOrigin='anonymous';
    const t=setTimeout(()=>res(null),30000);
    img.onload=()=>{clearTimeout(t);res(img);};img.onerror=()=>{clearTimeout(t);res(null);};
    img.src=url;
  })));
  const valid=imgs.filter(Boolean);
  if(!valid.length)throw new Error('Aucune image valide');
  onProg(15,`${valid.length} images OK`);

  // Decode audio offline
  onProg(18,'Décodage audio...');
  const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  let decoded=null;
  try{decoded=await audioCtx.decodeAudioData(await audioBlob.arrayBuffer());}catch(e){console.warn('audio decode failed',e);}
  const audioDur=decoded?decoded.duration:valid.length*7;
  const durPerImg=(audioDur*1000)/Math.max(valid.length,1);
  onProg(20,'Démarrage enregistrement...');

  // Setup canvas
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // Setup audio routing — decoded buffer → MediaStream destination
  const dest=audioCtx.createMediaStreamDestination();
  if(decoded){
    const src=audioCtx.createBufferSource();
    src.buffer=decoded;
    src.connect(dest);
    src.connect(audioCtx.destination);
    // Start after short delay to sync with video recording start
    src.start(audioCtx.currentTime+0.8);
  }

  // Create video stream with audio track
  const vStream=cv.captureStream(30);
  dest.stream.getAudioTracks().forEach(t=>vStream.addTrack(t));

  // MediaRecorder
  const mimes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  const rec=new MediaRecorder(vStream,mime?{mimeType:mime,videoBitsPerSecond:3000000}:{});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};

  // Ken Burns directions per image
  const kbDirs=[
    {sx:1.0,sy:1.0,ex:1.12,ey:1.12,ox:0,oy:0},      // zoom in center
    {sx:1.12,sy:1.12,ex:1.0,ey:1.0,ox:0,oy:0},       // zoom out center
    {sx:1.0,sy:1.0,ex:1.12,ey:1.12,ox:-20,oy:-15},   // zoom in + pan left-up
    {sx:1.0,sy:1.0,ex:1.12,ey:1.12,ox:20,oy:-10},    // zoom in + pan right-up
    {sx:1.08,sy:1.08,ex:1.0,ey:1.0,ox:15,oy:20},     // zoom out + pan right-down
    {sx:1.0,sy:1.0,ex:1.10,ey:1.10,ox:-10,oy:15},    // zoom in + pan left-down
  ];

  rec.start(100);

  return new Promise((resolve,reject)=>{
    rec.onstop=()=>resolve(new Blob(chunks,{type:mime||'video/webm'}));
    rec.onerror=reject;

    const t0=performance.now();
    // Wait for audio to start before drawing
    setTimeout(()=>{
      onProg(25,'Montage...');

      function draw(){
        const elapsed=performance.now()-t0-800; // subtract audio delay
        const totalMs=audioDur*1000;

        if(elapsed>=totalMs+500){
          rec.stop();audioCtx.close();
          onProg(100,'✅ Vidéo prête !');
          return;
        }

        const eClamp=Math.max(0,elapsed);
        const imgIdx=Math.min(Math.floor(eClamp/durPerImg),valid.length-1);
        const imgProg=Math.min((eClamp%durPerImg)/durPerImg,1); // 0→1
        const img=valid[imgIdx];
        const kb=kbDirs[imgIdx%kbDirs.length];

        // Interpolate Ken Burns params
        const scale=kb.sx+(kb.ex-kb.sx)*imgProg;
        const ox=kb.ox*imgProg;
        const oy=kb.oy*imgProg;

        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        if(img){
          ctx.save();
          ctx.translate(W/2+ox,H/2+oy);
          ctx.scale(scale,scale);
          ctx.drawImage(img,-W/2,-H/2,W,H);
          ctx.restore();
        }

        // Dark gradient at bottom
        const g=ctx.createLinearGradient(0,H*0.6,0,H);
        g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.7)');
        ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

        // Watermark
        ctx.fillStyle='rgba(255,255,255,.18)';
        ctx.font='bold 13px Barlow,sans-serif';
        ctx.textAlign='right';ctx.textBaseline='top';
        ctx.fillText('Papa Conteur',W-14,14);

        const pct=Math.min(Math.max(eClamp/totalMs,0),1);
        onProg(25+Math.floor(pct*73),`Montage: ${Math.floor(pct*100)}%`);
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    },900); // 900ms delay matches audio start (0.8s + buffer)
  });
}

const hide=id=>{const e=$(id);if(e)e.classList.add('hidden');};

  on('b-enrich','click',async()=>{const sc=$('f-escript')?.value?.trim()||S.studio.script;if(!sc)return;S.studio.script=sc;S.studio.busy=true;S.studio.err=null;render();try{S.studio.script=await enrichScript(sc,S.studio.ton,proj()?.characters||[]);}catch(e){S.studio.err=e.message;}S.studio.busy=false;render();});
  on('b-s1next','click',()=>{S.studio.title=$('f-etitle')?.value||S.studio.title;S.studio.script=$('f-escript')?.value||S.studio.script;patchEp({title:S.studio.title,script:S.studio.script});S.studio.step=2;S.studio.err=null;render();});
  on('b-genaud','click',async()=>{S.studio.busy=true;S.studio.err=null;render();try{const blob=await genAudio();const url=URL.createObjectURL(blob);S.studio.audioBlob=blob;S.studio.audioUrl=url;patchEp({audioUrl:url});}catch(e){S.studio.err='Audio: '+e.message;}S.studio.busy=false;render();setTimeout(()=>{const a=$('aud-el');if(a)a.onloadedmetadata=()=>{S.studio.audioDur=a.duration;};},100);});
  on('b-reaud','click',()=>{S.studio.audioUrl=null;S.studio.audioBlob=null;render();});
  on('b-s2back','click',()=>{S.studio.step=1;render();});
  on('b-s2next','click',()=>{const a=$('aud-el');if(a)S.studio.audioDur=a.duration||0;if(S.studio.segs.length===0)S.studio.segs=mkSegs(S.studio.script).map(text=>({text,prompt:'',url:'',status:'idle'}));S.studio.step=3;S.studio.err=null;render();});
  on('b-genimgs','click',doGenImgs);
  on('b-s3back','click',()=>{S.studio.step=2;render();});
  on('b-s3next','click',()=>{S.studio.step=4;S.studio.err=null;render();});
  on('b-genvid','click',async()=>{
    const urls=S.studio.segs.filter(s=>s.status==='done'&&s.url).map(s=>s.url);
    if(!urls.length){alert('Aucune image prête');return;}
    if(!S.studio.audioBlob){alert('Aucun audio — génère la voix d\'abord');return;}
    S.studio.busy=true;S.studio.err=null;render();
    try{const blob=await genVideo(urls,S.studio.audioBlob,(pct,msg)=>{const b=$('vpb'),t=$('vtxt');if(b)b.style.width=pct+'%';if(t)t.textContent=msg;});S.studio.vidBlob=blob;S.studio.vidUrl=URL.createObjectURL(blob);patchEp({videoUrl:S.studio.vidUrl});}
    catch(e){S.studio.err='Vidéo: '+e.message;}
    S.studio.busy=false;render();
  });
  on('b-revid','click',()=>{S.studio.vidUrl=null;S.studio.vidBlob=null;render();});
  on('b-s4back','click',()=>{S.studio.step=3;render();});
  on('b-newep2','click',()=>{S.view='project';S.epId=null;S.studio=fresh();render();});
  on('b-backproj','click',()=>{S.view='project';S.epId=null;render();});
  on('b-zip','click',async()=>{
    try{const zip=new JSZip();const f=zip.folder('papa_conteur');
    await Promise.all(S.studio.segs.filter(s=>s.url).map(async(s,i)=>{try{const r=await fetch(s.url);f.file(`${String(i+1).padStart(2,'0')}.jpg`,await r.blob());}catch(e){}}));
    if(S.studio.audioBlob)f.file('voix.wav',S.studio.audioBlob);
    f.file('notice.txt','Importe dans CapCut dans l\'ordre.\nAjoute voix.wav sur piste audio.\nExporte 1080x1920.');
    const blob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`papa_conteur_${S.studio.title||'ep'}.zip`;a.click();}
    catch(e){alert('ZIP: '+e.message);}
  });
}

function newProj(){const name=$('f-pname')?.value?.trim();if(!name){alert('Donne un nom');return;}const p={id:uid(),name,characters:[],episodes:[],seed:Math.floor(10000+Math.random()*90000),createdAt:new Date().toISOString()};S.projects.unshift(p);save();S.projId=p.id;S.view='project';render();}
function delProj(id){if(!confirm('Supprimer cette série ?'))return;S.projects=S.projects.filter(p=>p.id!==id);save();render();}
function openProj(id){S.projId=id;S.view='project';render();}
function addChar(){const name=$('f-cname')?.value?.trim(),desc=$('f-cdesc')?.value?.trim();if(!name||!desc){alert('Remplis nom et description');return;}const p=proj();if(!p)return;p.characters.push({id:uid(),name,role:$('f-crole')?.value||'Principal',description:desc});save();hide('m-char');render();}
function delChar(id){const p=proj();if(!p)return;p.characters=p.characters.filter(c=>c.id!==id);save();render();}
function newEp(){const p=proj();if(!p)return;const e={id:uid(),title:`Épisode ${p.episodes.length+1}`,script:'',audioUrl:null,images:[],videoUrl:null,createdAt:new Date().toISOString()};p.episodes.push(e);save();openEp(e.id);}
function openEp(id){S.epId=id;const e=ep();if(!e)return;S.studio=fresh();S.studio.title=e.title||'';S.studio.script=e.script||'';if(e.audioUrl)S.studio.audioUrl=e.audioUrl;if(e.images?.length>0){S.studio.segs=e.images.map(img=>({text:img.text||'',prompt:'',url:img.url||'',status:img.url?'done':'idle'}));S.studio.step=e.videoUrl?4:3;}if(e.videoUrl)S.studio.vidUrl=e.videoUrl;S.view='studio';render();}

load();render();
</script>
